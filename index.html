<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIKI MODS | DASHBOARD</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --main: #00ff88; --bg: #0d0d0d; --card: #1a1a1a; }
  body { background: var(--bg); color: #fff; font-family: 'Roboto Mono', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
  
  .panel { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 25px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
  
  h1 { color: var(--main); font-size: 24px; margin-top: 0; letter-spacing: 2px; text-transform: uppercase; border-bottom: 2px solid var(--main); display: inline-block; padding-bottom: 5px; }
  
  .step-label { color: var(--main); font-weight: bold; display: block; margin-bottom: 15px; font-size: 14px; text-align: left; }
  
  .btn { background: var(--main); color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 16px; transition: 0.2s; }
  .btn:active { transform: scale(0.98); }
  
  input { background: #222; border: 1px solid #444; color: #fff; padding: 15px; width: calc(100% - 32px); border-radius: 8px; margin-bottom: 15px; font-family: inherit; text-align: center; font-size: 16px; }
  input:focus { border-color: var(--main); outline: none; }

  #qrBox { display: none; margin: 20px 0; padding: 10px; background: #fff; border-radius: 10px; }
  .hidden { display: none; }
  .status { font-size: 12px; color: #777; margin-top: 20px; }
</style>
</head>
<body>

<h1>MIKI MODS</h1>

<div class="panel" id="payPanel">
  <span class="step-label">STEP 01: SCAN & PAY ₹20</span>
  <button class="btn" onclick="showQR()">GET PAYMENT QR</button>
  
  <div id="qrBox">
    <img id="upiQR" width="180">
    <p style="color: #000; font-size: 12px; margin-top: 5px;">Scan with GPay/PhonePe/Paytm</p>
  </div>
  
  <div id="verifyBox" class="hidden" style="margin-top: 20px;">
    <span class="step-label">STEP 02: VERIFY TRANSACTION</span>
    <input type="text" id="txnId" placeholder="Enter Ref No. / Txn ID">
    <button class="btn" style="background: #fff;" onclick="generateCode()">GET ACCESS CODE</button>
  </div>
</div>

<div class="panel hidden" id="accessPanel">
  <span class="step-label">STEP 03: UNLOCK CONTENT</span>
  <div id="finalCodeDisplay" style="font-size: 32px; color: yellow; margin-bottom: 20px; font-weight: bold;"></div>
  <input type="text" id="unlockCode" placeholder="Paste Your Code Here">
  <button class="btn" onclick="unlockContent()">INJECT MODS</button>
</div>

<div id="downloadArea" style="width: 100%; max-width: 400px;"></div>

<p class="status">SERVER: ONLINE | ENCRYPTION: AES-256</p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey:"AIzaSyDp4VvkYPWrTZifunRTsyf2oEce2KA2L8o",
 authDomain:"game-65d26.firebaseapp.com",
 projectId:"game-65d26",
 storageBucket:"game-65d26.firebasestorage.app",
 messagingSenderId:"1078240145943",
 appId:"1:1078240145943:web:259e64e15644153317e252"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const upiId = "mrbituyr-1@okicici";
let secretKey = "";

window.showQR = function() {
  const upiURL = `upi://pay?pa=${upiId}&pn=MikiMods&am=20&cu=INR`;
  document.getElementById("upiQR").src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiURL)}`;
  document.getElementById("qrBox").style.display = "block";
  document.getElementById("verifyBox").classList.remove("hidden");
}

window.generateCode = function() {
  const txn = document.getElementById("txnId").value;
  if(txn.length < 6) {
    alert("Please enter a valid Transaction ID!");
    return;
  }
  // Code tab dikhayenge payment verify "dikhaane" ke liye
  secretKey = Math.floor(1000 + Math.random() * 9000).toString();
  document.getElementById("payPanel").classList.add("hidden");
  document.getElementById("accessPanel").classList.remove("hidden");
  document.getElementById("finalCodeDisplay").innerText = secretKey;
  alert("Code Generated! Copy it and unlock.");
}

window.unlockContent = async function() {
  const code = document.getElementById("unlockCode").value;
  if(code === secretKey) {
    const querySnapshot = await getDocs(collection(db, "games"));
    let html = "";
    querySnapshot.forEach(doc => {
      const data = doc.data();
      html += `<div class="panel"><h3 style="margin:0">${data.name}</h3><br><a href="${data.link}"><button class="btn">DOWNLOAD NOW</button></a></div>`;
    });
    document.getElementById("accessPanel").classList.add("hidden");
    document.getElementById("downloadArea").innerHTML = html;
  } else {
    alert("Incorrect Code!");
  }
}
</script>
</body>
</html>
