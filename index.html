<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Tournament | Priyanshu Gaming</title>
    <style>
        /* Gaming Theme CSS */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0c10;
            font-family: 'Arial', sans-serif;
            color: #66fcf1;
            overflow-x: hidden;
        }
        .header {
            background: linear-gradient(45deg, #1f2833, #0b0c10);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #45a29e;
            box-shadow: 0px 5px 15px rgba(102, 252, 241, 0.2);
        }
        .container { padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; }
        
        /* Tournament Card Style */
        .match-card {
            background: #1f2833;
            border: 1px solid #45a29e;
            border-radius: 10px;
            width: 350px;
            margin: 15px;
            padding: 20px;
            transition: 0.3s;
            position: relative;
        }
        .match-card:hover { transform: scale(1.05); box-shadow: 0 0 20px #66fcf1; }
        .match-title { color: #fff; font-size: 22px; margin-bottom: 10px; border-bottom: 1px solid #45a29e; }
        .details { text-align: left; margin-bottom: 15px; color: #c5c6c7; }
        .details span { color: #66fcf1; font-weight: bold; }
        
        /* Slots Styling */
        .slots-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin: 10px 0;
        }
        .slot {
            background: #0b0c10;
            border: 1px solid #45a29e;
            font-size: 10px;
            padding: 5px;
            text-align: center;
            border-radius: 3px;
        }
        .booked { background: #ff4b2b; color: white; border: none; }

        /* Buttons */
        .join-btn {
            background: #45a29e;
            color: #0b0c10;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            border-radius: 5px;
            font-size: 16px;
        }
        .join-btn:hover { background: #66fcf1; }

        /* Login Modal */
        #loginOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: #1f2833;
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #66fcf1;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: #0b0c10;
            border: 1px solid #45a29e;
            color: white;
            border-radius: 5px;
            outline: none;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>FREE FIRE BATTLEGROUND</h1>
    <p>Join & Win Daily Rewards</p>
</div>

<div class="container">
    <div class="match-card">
        <div class="match-title">Solo Tournament #101</div>
        <div class="details">
            <p>Type: <span>SOLO</span></p>
            <p>Entry Fee: <span>₹10</span></p>
            <p>Prize: <span>₹500</span></p>
            <p>Time: <span>08:00 PM IST</span></p>
        </div>
        
        <div class="slots-container">
            <div class="slot booked">S1</div>
            <div class="slot booked">S2</div>
            <div class="slot">S3</div>
            <div class="slot">S4</div>
            <div class="slot">S5</div>
            <div class="slot">S6</div>
            <div class="slot">S7</div>
            <div class="slot">S8</div>
        </div>

        <button class="join-btn" onclick="openLogin()">JOIN MATCH</button>
    </div>
</div>

<div id="loginOverlay">
    <div class="login-box">
        <h2>LOGIN</h2>
        <p>Enter number to continue</p>
        <input type="number" id="userPhone" placeholder="Mobile Number (e.g. 9988xxxxxx)">
        <button class="join-btn" onclick="payNow()">PAY ₹10 VIA RAZORPAY</button>
        <p onclick="closeLogin()" style="margin-top:15px; cursor:pointer; color:#ff4b2b;">Close</p>
    </div>
</div>

<script>
    function openLogin() {
        document.getElementById('loginOverlay').style.display = 'flex';
    }

    function closeLogin() {
        document.getElementById('loginOverlay').style.display = 'none';
    }

    function payNow() {
        var phone = document.getElementById('userPhone').value;
        if(phone.length < 10) {
            alert("Bhai sahi number toh daal!");
            return;
        }
        
        // Yahan apna Razorpay Link daal dena
        var razorpayLink = "YOUR_RAZORPAY_LINK_HERE";
        
        if(razorpayLink === "YOUR_RAZORPAY_LINK_HERE") {
            alert("Admin: Link add karna bhul gaye ho!");
        } else {
            window.location.href = razorpayLink;
        }
    }

    // Ye code ensure karega ki koi element gayab na ho
    window.onload = function() {
        console.log("Website Ready!");
    };
</script>

</body>
</html>
