<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF LEGEND | PRIME MIKU</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --blue: #00d4ff; --dark: #07070a; --card: #12121a; --red: #ff4d4d; --green: #22c55e; }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; margin: 0; user-select: none; }
        
        #loader { position: fixed; inset: 0; background: #000; z-index: 10001; display: flex; align-items: center; justify-content: center; }
        nav { background: #000; padding: 12px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { color: #888; cursor: pointer; font-size: 10px; font-weight: bold; text-transform: uppercase; padding: 8px; font-family: 'Orbitron', sans-serif; }
        .nav-btn.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        .container { padding: 15px; max-width: 450px; margin: auto; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Stylish User Board */
        .user-bord { background: linear-gradient(135deg, #1e1e26 0%, #0a0a0f 100%); border: 1px solid var(--blue); border-radius: 20px; padding: 25px; margin: 15px auto; text-align: center; box-shadow: 0 0 20px rgba(0, 212, 255, 0.15); position: relative; overflow: hidden; }
        .user-name { font-size: 24px; font-family: 'Orbitron'; color: var(--gold); margin: 0; }
        .user-id { font-size: 12px; color: var(--blue); letter-spacing: 3px; margin-top: 5px; }

        .wallet-box { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 15px; border-radius: 12px; margin: 10px 0; border: 1px solid #222; }
        .match-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; font-family: 'Orbitron'; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: black; }
        .btn-red { background: var(--red); color: white; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }

        #chat-box { height: 200px; background: #050505; border-radius: 10px; padding: 10px; overflow-y: auto; border: 1px solid #222; margin-top: 10px; }
        .msg { font-size: 12px; margin-bottom: 8px; padding: 5px; border-bottom: 1px solid #111; }
        .msg.admin { color: var(--gold); border-left: 2px solid var(--gold); padding-left: 5px; }

        /* UTR Status */
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        .pending { background: #b45309; color: white; }

        #adm-nav, #admin-pan { display: none !important; }
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="loader"><div style="width:40px; height:40px; border:4px solid #222; border-top-color:var(--gold); border-radius:50%; animation:spin 1s linear infinite;"></div></div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <div id="auth-screen" style="display:none;">
        <div style="background:var(--card); padding:30px; border-radius:20px; border:1px solid var(--gold); width:100%; max-width:320px; text-align:center;">
            <h2 style="color:var(--gold); font-family:'Orbitron'; margin:0;">FF LEGEND</h2>
            <p style="color:#666; font-size:9px; letter-spacing:2px;">BY PRIME MIKU</p>
            <div id="login-form">
                <input type="email" id="le" placeholder="Email">
                <input type="password" id="lp" placeholder="Password">
                <button class="btn btn-gold" onclick="login()">LOGIN</button>
                <p onclick="toggleA(true)" style="font-size:11px; margin-top:15px; color:var(--blue); cursor:pointer;">New Account? Register</p>
            </div>
            <div id="reg-form" style="display:none">
                <input type="text" id="rn" placeholder="Full Name">
                <input type="email" id="re" placeholder="Email">
                <input type="password" id="rp" placeholder="Password">
                <button class="btn btn-gold" onclick="register()">SIGN UP</button>
                <p onclick="toggleA(false)" style="font-size:11px; margin-top:15px; color:var(--blue); cursor:pointer;">Back to Login</p>
            </div>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <nav>
            <div class="nav-btn active" onclick="switchS('home', this)">MATCHES</div>
            <div class="nav-btn" onclick="switchS('profile', this)">WALLET</div>
            <div class="nav-btn" id="adm-nav" onclick="switchS('admin-pan', this)">ADMIN</div>
        </nav>

        <div id="home" class="section active">
            <div class="container">
                <div class="wallet-box">
                    <span>Cash: <b id="w-amt" style="color:var(--green)">₹0</b></span>
                    <button class="btn btn-gold" style="width:100px; margin:0; font-size:10px;" onclick="switchS('profile', null)">DEPOSIT</button>
                </div>
                <div id="match-ui"></div>
            </div>
        </div>

        <div id="profile" class="section">
            <div class="container">
                <div class="user-bord">
                    <h2 class="user-name" id="p-name">LOADING...</h2>
                    <div class="user-id" id="p-sid">FFL-0000</div>
                </div>

                <div class="match-card" style="border-left-color:var(--green)">
                    <h4 style="color:var(--green); margin:0;">ADD CASH (UPI)</h4>
                    <p style="font-size:11px; color:#888;">Step 1: Scan QR & Pay Min ₹20</p>
                    <div style="text-align:center; margin:15px 0;">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=mrbituyr-1@okicici&pn=PrimeMiku&am=20" style="background:white; padding:5px; border-radius:10px;">
                        <p style="font-size:11px; color:var(--gold); margin-top:5px;">mrbituyr-1@okicici</p>
                    </div>
                    
                    <hr style="border:0; border-top:1px solid #222; margin:15px 0;">
                    
                    <h4 style="color:var(--blue); margin:0;">Step 2: Submit Details</h4>
                    <div id="utr-form">
                        <input type="text" id="u-name" placeholder="Payer Name">
                        <input type="number" id="u-amt" placeholder="Amount Paid">
                        <input type="text" id="u-utr" placeholder="12 Digit UTR Number">
                        <button class="btn btn-blue" id="sub-btn" onclick="submitUTR()">SUBMIT PAYMENT</button>
                    </div>
                    <div id="utr-status" style="display:none; text-align:center; margin-top:10px;">
                        <span class="status-badge pending">Checking... Please Wait</span>
                    </div>
                </div>

                <div class="match-card">
                    <h4 style="color:var(--gold); margin:0;">SUPPORT</h4>
                    <div id="chat-box"></div>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <input type="text" id="m-in" placeholder="Message...">
                        <button class="btn btn-gold" style="width:70px; margin:0;" onclick="sendM()">SEND</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="admin-pan" class="section">
            <div class="container">
                <h2 style="color:var(--gold); font-family:'Orbitron';">OWNER PANEL</h2>
                
                <div class="match-card" style="border-left-color:var(--blue)">
                    <h4>PENDING DEPOSITS</h4>
                    <div id="pending-utr-list" style="font-size:11px;"></div>
                </div>

                <div class="match-card">
                    <h4>MATCH CONTROL</h4>
                    <input type="text" id="mt" placeholder="Match Name">
                    <input type="number" id="mf" placeholder="Entry Fee">
                    <input type="text" id="mti" placeholder="Time">
                    <button class="btn btn-gold" onclick="admMatch()">PUBLISH MATCH</button>
                </div>

                <div class="match-card" style="border-left-color:var(--red)">
                    <h4>BAN PLAYER</h4>
                    <input type="text" id="bsid" placeholder="Site ID">
                    <button class="btn btn-red" onclick="admBan(true)">BAN PLAYER</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAFvaJjgrPghBwx5FPFeLPc0XCi6GFNA1k", authDomain: "ff-legend-tournament.firebaseapp.com", projectId: "ff-legend-tournament", storageBucket: "ff-legend-tournament.firebasestorage.app", messagingSenderId: "648355009637", appId: "1:648355009637:web:2a7b87b72566a129ae228c" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        auth.onAuthStateChanged(async u => {
            document.getElementById('loader').style.display='none';
            if(u){
                const d = await db.collection("users").doc(u.uid).get();
                if(d.data().isBanned){ alert("ACCESS DENIED: BANNED"); auth.signOut(); return; }
                document.getElementById('auth-screen').style.display='none';
                document.getElementById('main-app').style.display='block';
                if(d.data().isAdmin){ 
                    document.getElementById('adm-nav').style.setProperty('display','block','important'); 
                    loadPendingUTR();
                }
                document.getElementById('p-name').innerText = d.data().name;
                document.getElementById('p-sid').innerText = d.data().siteID;
                sync(u.uid); loadM(); loadC(); checkMyUTR(u.uid);
            } else { 
                document.getElementById('auth-screen').style.display='flex'; 
                document.getElementById('main-app').style.display='none'; 
            }
        });

        async function submitUTR(){
            const n = document.getElementById('u-name').value, a = document.getElementById('u-amt').value, u = document.getElementById('u-utr').value;
            if(!n || !a || u.length < 10) return alert("Enter Valid Details!");
            
            document.getElementById('sub-btn').disabled = true;
            document.getElementById('sub-btn').innerText = "SUBMITTING...";

            await db.collection("deposits").add({
                uid: auth.currentUser.uid,
                siteID: document.getElementById('p-sid').innerText,
                name: n,
                amount: parseInt(a),
                utr: u,
                status: "pending",
                ts: Date.now()
            });
            
            alert("Submitted! Wait for Admin Verification.");
            checkMyUTR(auth.currentUser.uid);
        }

        function checkMyUTR(uid){
            db.collection("deposits").where("uid","==",uid).where("status","==","pending").onSnapshot(s=>{
                if(!s.empty){
                    document.getElementById('utr-form').style.display = 'none';
                    document.getElementById('utr-status').style.display = 'block';
                } else {
                    document.getElementById('utr-form').style.display = 'block';
                    document.getElementById('utr-status').style.display = 'none';
                    document.getElementById('sub-btn').disabled = false;
                    document.getElementById('sub-btn').innerText = "SUBMIT PAYMENT";
                }
            });
        }

        // ADMIN: Load Requests
        function loadPendingUTR(){
            db.collection("deposits").where("status","==","pending").onSnapshot(s=>{
                const l = document.getElementById('pending-utr-list');
                l.innerHTML = "";
                s.forEach(d=>{
                    l.innerHTML += `<div style="background:#1a1a24; padding:10px; margin-bottom:5px; border-radius:8px;">
                        <b>${d.data().name}</b> (${d.data().siteID})<br>
                        Amount: ₹${d.data().amount} | UTR: ${d.data().utr}<br>
                        <button class="btn btn-gold" style="width:48%; padding:5px; font-size:10px;" onclick="approveDep('${d.id}','${d.data().uid}',${d.data().amount})">APPROVE</button>
                        <button class="btn btn-red" style="width:48%; padding:5px; font-size:10px;" onclick="db.collection('deposits').doc('${d.id}').delete()">REJECT</button>
                    </div>`;
                });
            });
        }

        async function approveDep(docId, userUid, amt){
            await db.collection("users").doc(userUid).update({ wallet: firebase.firestore.FieldValue.increment(amt) });
            await db.collection("deposits").doc(docId).update({ status: "approved" });
            alert("Money Added to Player Wallet!");
        }

        // Standard Functions
        async function register(){
            const n=document.getElementById('rn').value, e=document.getElementById('re').value, p=document.getElementById('rp').value, sid="FFL-"+Math.floor(1000+Math.random()*8999);
            if(!n || !e || p.length<6) return alert("Valid Info Required!");
            try{ const r=await auth.createUserWithEmailAndPassword(e,p); await db.collection("users").doc(r.user.uid).set({name:n,email:e,siteID:sid,wallet:0,isAdmin:false,isBanned:false,joined:[]}); }catch(e){alert(e.message);}
        }
        async function login(){ try{await auth.signInWithEmailAndPassword(document.getElementById('le').value,document.getElementById('lp').value);}catch(e){alert("Login Failed!");}}
        function loadM(){ db.collection("matches").onSnapshot(s=>{const l=document.getElementById('match-ui');l.innerHTML="";s.forEach(d=>{l.innerHTML+=`<div class="match-card"><h4>${d.data().title}</h4><p style="font-size:11px;color:#888;">Entry: ₹${d.data().fee} | Time: ${d.data().time}</p><button class="btn btn-gold" onclick="joinM('${d.id}',${d.data().fee})">JOIN MATCH</button></div>`;});});}
        async function joinM(id,f){
            const u=auth.currentUser, d=await db.collection("users").doc(u.uid).get();
            if(d.data().wallet<f){ alert("Low Balance! Please Deposit."); switchS('profile',null); return; }
            const fid=prompt("Enter FF UID:"); if(!fid)return;
            await db.collection("users").doc(u.uid).update({wallet:firebase.firestore.FieldValue.increment(-f),joined:firebase.firestore.FieldValue.arrayUnion(id)});
            await db.collection("matches").doc(id).update({players:firebase.firestore.FieldValue.arrayUnion({name:d.data().name,uid:fid})}); alert("Joined Successfully!");
        }
        async function sendM(){ const t=document.getElementById('m-in').value, u=await db.collection("users").doc(auth.currentUser.uid).get(); if(!t)return; await db.collection("chats").add({name:u.data().name,text:t,ts:Date.now(),isAdmin:u.data().isAdmin}); document.getElementById('m-in').value="";}
        function loadC(){ db.collection("chats").orderBy("ts","asc").onSnapshot(s=>{const b=document.getElementById('chat-box');b.innerHTML="";s.forEach(d=>{b.innerHTML+=`<div class="msg ${d.data().isAdmin?'admin':''}"><b>${d.data().name}:</b> ${d.data().text}</div>`;});b.scrollTop=b.scrollHeight;});}
        function sync(uid){ db.collection("users").doc(uid).onSnapshot(d=>{document.getElementById('w-amt').innerText="₹"+d.data().wallet;});}
        async function admMatch(){ await db.collection("matches").add({title:document.getElementById('mt').value,fee:parseInt(document.getElementById('mf').value),time:document.getElementById('mti').value,players:[]}); alert("Match Published!"); }
        async function admBan(v){ const s=document.getElementById('bsid').value, q=await db.collection("users").where("siteID","==",s).get(); if(!q.empty){ await db.collection("users").doc(q.docs[0].id).update({isBanned:v}); alert("Status Updated!"); }}
        function switchS(id, el){ document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); document.getElementById(id).classList.add('active'); if(el) el.classList.add('active'); if(id === 'admin-pan') document.getElementById(id).style.setProperty('display','block','important'); }
        function toggleA(r){ document.getElementById('login-form').style.display=r?'none':'block'; document.getElementById('reg-form').style.display=r?'block':'none'; }
    </script>
</body>
</html>
