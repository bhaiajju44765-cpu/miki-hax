<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FF LEGEND | PRIME MIKU OFFICIAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #ffcc00; --blue: #00d4ff; --bg: #0a0a0f; --card: #151520; --red: #ff3131; --green: #00ff88; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        header { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 15px; border-bottom: 2px solid var(--gold); text-align: center; position: sticky; top: 0; z-index: 1000; }
        header h1 { font-family: 'Orbitron'; color: var(--gold); margin: 0; font-size: 20px; letter-spacing: 2px; }

        #ban-screen { position: fixed; inset: 0; background: #000; z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: var(--red); padding: 20px; }

        #auth-page { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); width: 100%; max-width: 380px; }

        nav { background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; z-index: 1000; }
        .nav-btn { color: #666; font-size: 10px; font-family: 'Orbitron'; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--gold); text-shadow: 0 0 8px var(--gold); }

        .container { padding: 15px; max-width: 500px; margin: auto; display: none; }
        .container.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 15px; border: 1px solid #252535; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-mini { padding: 8px 12px; font-size: 10px; width: auto; margin: 2px; border-radius: 5px; }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; outline: none; }
        input:focus { border-color: var(--gold); }

        #chat-win { height: 380px; overflow-y: auto; background: #08080c; border-radius: 15px; padding: 15px; border: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .bubble { padding: 10px 14px; border-radius: 15px; margin-bottom: 8px; font-size: 13px; max-width: 85%; }
        .bubble.me { background: var(--gold); color: #000; align-self: flex-end; }
        .bubble.adm { background: #1a1a25; border: 1px solid var(--blue); align-self: flex-start; }

        .m-timer { color: var(--blue); font-size: 11px; font-weight: 700; background: rgba(0,212,255,0.1); padding: 4px 10px; border-radius: 50px; margin-bottom: 8px; display: inline-block; }
        .room-box { margin-top: 12px; padding: 12px; background: rgba(0,212,255,0.05); border: 1px dashed var(--blue); border-radius: 10px; }
        .p-row { background: #0a0a0f; padding: 10px; border-radius: 8px; margin-top: 8px; border: 1px solid #333; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="ban-screen">
        <h1 style="font-family:Orbitron;">BANNED</h1>
        <p>Aapko Rules todne ki wajah se block kar diya gaya hai.</p>
    </div>

    <div id="auth-page">
        <div class="auth-box">
            <h1 style="text-align:center; color:var(--gold); font-family:Orbitron;">FF LEGEND</h1>
            <div id="login-form">
                <input type="email" id="l-email" placeholder="Email">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn btn-gold" onclick="login()">LOGIN</button>
                <p onclick="toggleA(true)" style="text-align:center; font-size:12px; cursor:pointer; margin-top:10px;">New Player? <span style="color:var(--gold)">Register</span></p>
            </div>
            <div id="reg-form" style="display:none;">
                <input type="text" id="r-name" placeholder="Game Name">
                <input type="email" id="r-email" placeholder="Email">
                <input type="password" id="r-pass" placeholder="Password">
                <button class="btn btn-gold" onclick="register()">CREATE ACCOUNT</button>
                <p onclick="toggleA(false)" style="text-align:center; font-size:12px; cursor:pointer; margin-top:10px;">Have ID? <span style="color:var(--gold)">Login</span></p>
            </div>
        </div>
    </div>

    <div id="app" style="display:none;">
        <header><h1>FF LEGEND</h1></header>

        <div id="home" class="container active">
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><small>WALLET</small><br><b id="u-bal" style="color:var(--green); font-size:22px;">₹0</b></div>
                <div style="text-align:right;"><small>SITE ID</small><br><b id="u-sid" style="color:var(--blue); font-family:Orbitron;">...</b></div>
            </div>
            <div id="match-feed"></div>
        </div>

        <div id="chat" class="container">
            <div id="chat-win"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="text" id="chat-in" placeholder="Message..." style="margin:0;">
                <button class="btn btn-gold" style="width:70px; margin:0;" onclick="sendMsg()">SEND</button>
            </div>
        </div>

        <div id="wallet" class="container">
            <div class="card" style="text-align:center;">
                <h3>RECHARGE</h3>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=mrbituyr-1@okicici&pn=PrimeMiku&am=20" style="padding:5px; background:#fff; border-radius:10px;">
                <input type="text" id="utr" placeholder="12 Digit UTR">
                <button class="btn btn-gold" onclick="submitUTR()">SUBMIT</button>
            </div>
            <button class="btn btn-red" onclick="auth.signOut()">LOGOUT</button>
        </div>

        <div id="admin" class="container">
            <div class="card" style="border-left:4px solid var(--blue);">
                <h4>PLAYER EDIT</h4>
                <input id="search-sid" placeholder="Site ID">
                <button class="btn btn-gold btn-mini" onclick="findUser()">SEARCH</button>
                <div id="u-edit" style="display:none; margin-top:10px;">
                    <p id="edit-name"></p>
                    <input type="number" id="amt-edit" placeholder="Amount">
                    <button class="btn-gold btn-mini" onclick="changeBal(true)">ADD</button>
                    <button class="btn-red btn-mini" onclick="changeBal(false)">SUB</button>
                    <button id="ban-btn" class="btn btn-red" onclick="toggleBan()">BAN</button>
                </div>
            </div>
            <div class="card">
                <h4>CREATE MATCH</h4>
                <input id="m-t" placeholder="Match Title">
                <input id="m-f" type="number" placeholder="Fee">
                <input id="m-tm" type="datetime-local">
                <button class="btn btn-gold" onclick="postMatch()">POST LIVE</button>
            </div>
            <div id="adm-match-list"></div>
            <div id="adm-utr-list" class="card"><h4>UTR REQUESTS</h4></div>
        </div>

        <nav>
            <div class="nav-btn active" id="n-home" onclick="nav('home')">MATCHES</div>
            <div class="nav-btn" id="n-chat" onclick="nav('chat')">SUPPORT</div>
            <div class="nav-btn" id="n-wallet" onclick="nav('wallet')">WALLET</div>
            <div id="adm-nav" class="nav-btn" style="display:none; color:var(--red);" onclick="nav('admin')">ADMIN</div>
        </nav>
    </div>

    <div id="join-popup" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:10000; display:none; align-items:center; justify-content:center; padding:20px;">
        <div class="card" style="width:100%; max-width:400px; border:1px solid var(--gold);">
            <h3 style="font-family:Orbitron;">JOIN MATCH</h3>
            <input type="text" id="p-name" placeholder="In-Game Name">
            <input type="text" id="p-uid" placeholder="Game UID">
            <input type="number" id="p-lvl" placeholder="Level (50+)">
            <button class="btn btn-gold" id="confirm-btn">CONFIRM JOIN</button>
            <button class="btn" style="background:transparent; color:#555;" onclick="document.getElementById('join-popup').style.display='none'">CANCEL</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAFvaJjgrPghBwx5FPFeLPc0XCi6GFNA1k", authDomain: "ff-legend-tournament.firebaseapp.com", projectId: "ff-legend-tournament", storageBucket: "ff-legend-tournament.firebasestorage.app", messagingSenderId: "648355009637", appId: "1:648355009637:web:2a7b87b72566a129ae228c" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let targetUid = "";

        auth.onAuthStateChanged(async user => {
            if(user){
                const uDoc = await db.collection("users").doc(user.uid).get();
                if(uDoc.exists && uDoc.data().isBanned) { document.getElementById('ban-screen').style.display='flex'; return; }
                document.getElementById('auth-page').style.display='none';
                document.getElementById('app').style.display='block';
                if(uDoc.exists && uDoc.data().isAdmin) document.getElementById('adm-nav').style.display='block';
                sync(user.uid); loadMatches(); loadChats(); initAdmin();
            } else { document.getElementById('auth-page').style.display='flex'; }
        });

        function sync(uid){ db.collection("users").doc(uid).onSnapshot(d => { if(d.exists){ document.getElementById('u-bal').innerText = "₹" + d.data().wallet; document.getElementById('u-sid').innerText = d.data().siteID; }}); }

        function loadMatches(){
            db.collection("matches").onSnapshot(snap => {
                const feed = document.getElementById('match-feed'); feed.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data(), mid = doc.id;
                    const isJ = m.players.some(p => p.uid === auth.currentUser.uid);
                    feed.innerHTML += `
                        <div class="card">
                            <span class="m-timer" id="t-${mid}">Loading...</span>
                            <h3 style="margin:5px 0;">${m.title}</h3>
                            <p style="font-size:12px; color:#777;">FEE: ₹${m.fee} | PRIZE: ₹${m.fee*40}</p>
                            <div id="room-${mid}" class="room-box" style="display:none;">
                                <div style="display:flex; justify-content:space-between;">
                                    <div><small style="color:var(--blue);">ID:</small> <b>${m.rId || 'WAITING'}</b></div>
                                    <div><small style="color:var(--blue);">PASS:</small> <b>${m.rPs || 'WAITING'}</b></div>
                                </div>
                            </div>
                            <div id="b-${mid}"></div>
                        </div>`;
                    
                    setInterval(() => {
                        const diff = new Date(m.time) - Date.now();
                        const t = document.getElementById(`t-${mid}`), b = document.getElementById(`b-${mid}`), r = document.getElementById(`room-${mid}`);
                        if(!t) return;
                        if(diff <= 0){
                            t.innerText = "MATCH LIVE 🟢"; t.style.color = "var(--green)";
                            if(isJ) { r.style.display = 'block'; b.innerHTML = `<button class="btn" style="background:#222;" disabled>JOINED</button>`; }
                            else { b.innerHTML = `<button class="btn btn-red" disabled>STARTED</button>`; }
                        } else {
                            const h=Math.floor(diff/36e5), mi=Math.floor((diff%36e5)/6e4), s=Math.floor((diff%6e4)/1000);
                            t.innerText = `STARTS IN: ${h}h ${mi}m ${s}s`;
                            if(isJ) { b.innerHTML = `<button class="btn btn-gold" style="opacity:0.6" disabled>JOINED ✅</button>`; if(diff < 900000) r.style.display = 'block'; }
                            else { b.innerHTML = `<button class="btn btn-gold" onclick="openJ('${mid}',${m.fee})">JOIN MATCH</button>`; }
                        }
                    }, 1000);
                });
            });
        }

        function openJ(id, fee){ document.getElementById('join-popup').style.display='flex'; document.getElementById('confirm-btn').onclick = () => processJoin(id, fee); }
        
        async function processJoin(mid, fee){
            const lvl = parseInt(document.getElementById('p-lvl').value);
            const pName = document.getElementById('p-name').value;
            const pUid = document.getElementById('p-uid').value;
            if(!pName || !pUid || !lvl) return alert("Fill all details!");
            if(lvl < 50) return alert("Level 50+ Required!");

            const uRef = db.collection("users").doc(auth.currentUser.uid);
            const uSnap = await uRef.get();
            const uData = uSnap.data();

            if(uData.wallet < fee) {
                alert("Low Balance! Please Recharge.");
                return; 
            }

            try {
                await uRef.update({ wallet: firebase.firestore.FieldValue.increment(-fee) });
                await db.collection("matches").doc(mid).update({ 
                    players: firebase.firestore.FieldValue.arrayUnion({ uid:auth.currentUser.uid, name:pName, ffid:pUid, level:lvl, kills:0 }) 
                });
                alert("Joined!"); document.getElementById('join-popup').style.display='none';
            } catch(e) { alert("Error joining match."); }
        }

        async function findUser(){
            const q = await db.collection("users").where("siteID","==",document.getElementById('search-sid').value).get();
            if(q.empty) return alert("Not Found");
            targetUid = q.docs[0].id; const u = q.docs[0].data();
            document.getElementById('u-edit').style.display = 'block';
            document.getElementById('edit-name').innerText = u.name + " (₹" + u.wallet + ")";
            document.getElementById('ban-btn').innerText = u.isBanned ? "UNBAN" : "BAN";
        }
        async function changeBal(a){ 
            const amt = parseInt(document.getElementById('amt-edit').value) || 0;
            await db.collection("users").doc(targetUid).update({ wallet: firebase.firestore.FieldValue.increment(a ? amt : -amt) }); 
            findUser(); 
        }
        async function toggleBan(){ 
            const u=(await db.collection("users").doc(targetUid).get()).data(); 
            await db.collection("users").doc(targetUid).update({isBanned:!u.isBanned}); 
            findUser(); 
        }

        function initAdmin(){
            db.collection("matches").onSnapshot(snap => {
                const box = document.getElementById('adm-match-list'); box.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data(), mid = doc.id;
                    let ps = ""; m.players.forEach((p, i) => ps += `<div class="p-row"><span>${p.name} (K:${p.kills})</span> <div><button class="btn-gold btn-mini" onclick="addKill('${mid}',${i})">+K</button><button class="btn-red btn-mini" onclick="kickP('${mid}','${p.uid}')">X</button></div></div>`);
                    box.innerHTML += `<div class="card"><b>${m.title}</b><input id="ri-${mid}" value="${m.rId||''}" placeholder="Room ID"><input id="rp-${mid}" value="${m.rPs||''}" placeholder="Pass"><button class="btn btn-gold btn-mini" onclick="updateR('${mid}')">Update</button><button class="btn btn-red btn-mini" onclick="delM('${mid}')">Del</button>${ps}</div>`;
                });
            });
            db.collection("deposits").where("status","==","pending").onSnapshot(s => {
                const b = document.getElementById('adm-utr-list'); b.innerHTML = "";
                s.forEach(d => b.innerHTML += `<div class="p-row">${d.data().utr} <button class="btn-gold btn-mini" onclick="appr('${d.id}','${d.data().uid}')">Approve</button></div>`);
            });
        }
        async function updateR(id){ 
            const ri = document.getElementById('ri-'+id).value;
            const rp = document.getElementById('rp-'+id).value;
            await db.collection("matches").doc(id).update({ rId: ri, rPs: rp }); 
            alert("Match Details Updated!"); 
        }
        async function addKill(id, i){ const m=(await db.collection("matches").doc(id).get()).data(); m.players[i].kills++; await db.collection("matches").doc(id).update({players:m.players}); }
        async function kickP(id, uid){ const m=(await db.collection("matches").doc(id).get()).data(); const f=m.players.filter(p=>p.uid!==uid); await db.collection("matches").doc(id).update({players:f}); }
        async function delM(id){ if(confirm("Delete Match?")) await db.collection("matches").doc(id).delete(); }
        async function postMatch(){ 
            const t = document.getElementById('m-t').value;
            const f = parseInt(document.getElementById('m-f').value);
            const tm = document.getElementById('m-tm').value;
            if(!t || !f || !tm) return alert("Fill all match details!");
            await db.collection("matches").add({ title:t, fee:f, time:tm, players:[], rId:"", rPs:"" }); 
            alert("Match Posted!");
        }
        async function appr(id, uid){ await db.collection("users").doc(uid).update({wallet:firebase.firestore.FieldValue.increment(20)}); await db.collection("deposits").doc(id).update({status:"ok"}); }
        async function submitUTR(){ 
            const val = document.getElementById('utr').value;
            if(val.length < 10) return alert("Enter valid UTR");
            await db.collection("deposits").add({ uid:auth.currentUser.uid, utr:val, status:"pending" }); 
            alert("Request Sent!"); document.getElementById('utr').value = "";
        }

        function nav(id){ document.querySelectorAll('.container').forEach(c=>c.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); document.getElementById('n-'+id).classList.add('active'); }
        function toggleA(r){ document.getElementById('login-form').style.display=r?'none':'block'; document.getElementById('reg-form').style.display=r?'block':'none'; }
        async function login(){ try { await auth.signInWithEmailAndPassword(document.getElementById('l-email').value, document.getElementById('l-pass').value); } catch(e){ alert("Wrong Email/Password!"); } }
        async function register(){ 
            try {
                const r = await auth.createUserWithEmailAndPassword(document.getElementById('r-email').value, document.getElementById('r-pass').value);
                await db.collection("users").doc(r.user.uid).set({ name:document.getElementById('r-name').value, wallet:0, siteID:"FFL-"+Math.floor(1000+Math.random()*9000), isAdmin:false, isBanned:false });
            } catch(e) { alert("Registration Error!"); }
        }
        async function sendMsg(){ 
            const txt = document.getElementById('chat-in').value;
            if(!txt) return;
            const u=(await db.collection("users").doc(auth.currentUser.uid).get()).data(); 
            await db.collection("chats").add({name:u.name, text:txt, ts:Date.now(), isAdm:u.isAdmin}); 
            document.getElementById('chat-in').value=""; 
        }
        function loadChats(){ db.collection("chats").orderBy("ts","asc").onSnapshot(s => { const b=document.getElementById('chat-win'); b.innerHTML=""; s.forEach(d=>b.innerHTML+=`<div class="bubble ${d.data().isAdm?'adm':'me'}"><b>${d.data().name}</b><br>${d.data().text}</div>`); b.scrollTop=b.scrollHeight; }); }
    </script>
</body>
</html>
