<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIKI ESPORTS | TOURNAMENT HUB</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        :root { 
            --main: #00f2fe; /* Neon Blue */
            --accent: #ff0055; /* Neon Pink */
            --bg: #0a0e17; /* Deep Gaming Black */
            --card: #161b29; /* Dark Gray Card */
            --text: #ffffff;
            --glow: 0 0 15px rgba(0, 242, 254, 0.6);
        }

        body { 
            background: var(--bg); 
            background-image: url('https://www.transparenttextures.com/patterns/dark-dotted-2.png'); /* Gaming texture */
            color: var(--text); 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            user-select: none; 
            overflow-x: hidden;
        }

        /* --- Header & Logo --- */
        .header { 
            background: rgba(0, 0, 0, 0.8); 
            padding: 15px; 
            text-align: center; 
            border-bottom: 2px solid var(--main); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .trophy-logo { 
            font-size: 24px; 
            cursor: pointer; 
            filter: drop-shadow(0 0 5px var(--main));
            transition: 0.3s;
        }
        .trophy-logo:active { transform: scale(1.2) rotate(10deg); }

        .brand-name {
            font-size: 18px; 
            font-weight: 900; 
            color: var(--main); 
            letter-spacing: 2px; 
            text-shadow: var(--glow);
            text-transform: uppercase;
        }

        /* --- Main Container & Cards --- */
        .container { padding: 20px; max-width: 500px; margin: auto; padding-bottom: 50px;}
        .card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 16px; 
            border: 1px solid #333; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .card:hover { border-color: var(--main); box-shadow: 0 10px 40px rgba(0,242,254,0.2); }

        /* --- Beautiful Styling --- */
        h3, h4 { margin-top: 0; color: var(--main); text-transform: uppercase; letter-spacing: 1px; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            background: rgba(0,0,0,0.5); 
            border: 1px solid #444; 
            color: var(--text); 
            border-radius: 8px; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s;
        }
        input:focus { border-color: var(--main); box-shadow: 0 0 10px rgba(0,242,254,0.3); }

        /* Lovely Lovely Buttons */
        .btn { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(45deg, var(--main), #4facfe);
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-weight: 900; 
            cursor: pointer; 
            margin-top: 15px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            box-shadow: 0 5px 15px rgba(0,242,254,0.3);
            transition: 0.3s;
        }
        .btn:hover { box-shadow: 0 8px 25px rgba(0,242,254,0.5); transform: translateY(-2px); }
        .btn:active { transform: translateY(1px) scale(0.98); }

        .btn-add-cash {
            background: linear-gradient(45deg, #11998e, #38ef7d); /* Green Gradient */
            color: #fff;
            padding: 10px 20px;
            width: auto;
            margin-top: 0;
            font-size: 12px;
        }

        .hidden { display: none; }

        /* --- Tournament View Match Cards --- */
        .wallet-box { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(0,242,254,0.05); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--main); 
            margin-bottom: 25px; 
            box-shadow: var(--glow);
        }

        .match-card { 
            background: #111; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #222;
            margin-bottom: 20px; 
            position: relative; 
            overflow: hidden;
            transition: 0.3s;
        }
        .match-card:hover { border-color: var(--accent); }
        .match-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,0,85,0.05) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
        }

        .type-tag { 
            position: absolute; top: 15px; right: 15px; 
            font-size: 10px; background: var(--accent); color: #fff; 
            padding: 3px 8px; border-radius: 4px; font-weight: bold; 
            text-transform: uppercase; z-index: 1;
        }

        .match-title { font-size: 18px; font-weight: bold; color: var(--text); z-index: 1; position: relative; }
        .match-details { font-size: 12px; color: #aaa; margin: 10px 0; z-index: 1; position: relative; display: flex; justify-content: space-between; }
        .fee-tag { color: var(--main); font-weight: bold; }
        .prize-tag { color: #ffca28; font-weight: bold; }

        /* Admin/Table Styling */
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 15px; background: #000; border-radius: 8px; overflow: hidden;}
        th, td { border: 1px solid #222; padding: 12px; text-align: left; }
        th { background: #1a1a1a; color: var(--main); text-transform: uppercase;}
        tr:hover { background: rgba(255,255,255,0.03); }
        hr { border: 0; border-top: 1px solid #333; margin: 25px 0; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="header">
    <div style="width:30px;"></div> <div class="brand-name">MIKI ESPORTS</div>
    <div class="trophy-logo" id="admin-trigger">🏆</div>
</div>

<div class="container">
    <div id="auth-section" class="card" style="text-align:center;">
        <h3 id="auth-title">PLAYER LOGIN</h3>
        <p style="font-size:12px; color:#aaa; margin-bottom:20px;">Enter the arena to claim your glory.</p>
        <input type="number" id="u-phone" placeholder="Mobile Number">
        <input type="password" id="u-pass" placeholder="Password">
        <button class="btn" onclick="handleAuth()">ENTER ARENA</button>
        <p style="font-size:12px; color:#aaa; cursor:pointer; margin-top:20px;" onclick="toggleMode()" id="mode-text">New Warrior? Create Account</p>
    </div>

    <div id="dashboard" class="hidden">
        <div class="wallet-box">
            <div>
                <small style="color:#888; text-transform:uppercase; font-size:10px; letter-spacing:1px;">YOUR BALANCE</small>
                <div id="bal" style="font-size:28px; font-weight:900; color:var(--main); text-shadow: var(--glow);">₹0</div>
                <small id="display-phone" style="color:#aaa; font-size:10px;"></small>
            </div>
            <button onclick="openPaymentGateway()" class="btn btn-add-cash">ADD CASH</button>
        </div>
        <h4>LIVE MISSIONS</h4>
        <div id="match-list">Loading missions...</div>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="card" style="border-color: var(--accent); background: rgba(20,0,10,0.95);">
            <h3 style="color:var(--accent); text-align:center; text-shadow: 0 0 10px var(--accent);">ADMIN COMMAND CENTER</h3>
            
            <p style="font-size:11px; color:#aaa;">Update Room ID/Pass:</p>
            <input type="text" id="m-id" placeholder="Match ID (M1, M2)">
            <input type="text" id="r-id" placeholder="Room ID">
            <input type="text" id="r-ps" placeholder="Room Password">
            <button class="btn" style="background:var(--accent); color:#fff; box-shadow: 0 5px 15px rgba(255,0,85,0.3);" onclick="updateRoom()">PUSH ROOM DATA</button>
            
            <hr>
            
            <p style="font-size:11px; color:#aaa;">Direct Recharge (By Phone):</p>
            <input type="text" id="t-uid" placeholder="Player Phone Number">
            <input type="number" id="a-amt" placeholder="Amount to Add">
            <button class="btn" onclick="addCash()">DIRECT ADD CASH</button>

            <hr>

            <p style="font-size:11px; color:#aaa;">Check Joined Players:</p>
            <input type="text" id="v-mid" placeholder="Match ID (M1, M2)">
            <button class="btn" style="background:#333; color:#fff;" onclick="viewPlayers()">LOAD PLAYER LIST</button>
            
            <div id="players-table-area" class="hidden" style="overflow-x:auto;">
                <table id="p-table">
                    <thead><tr><th>Name</th><th>Game UID</th><th>Level</th><th>Status</th></tr></thead>
                    <tbody id="p-list"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// --- CONFIGURATION ---
const firebaseConfig = {
    apiKey: "AIzaSyDiVgQ-FMis2N77nHu6dTY17aTPpmBrNL4",
    authDomain: "miki-turnament-93d48.firebaseapp.com",
    projectId: "miki-turnament-93d48",
    storageBucket: "miki-turnament-93d48.firebasestorage.app",
    messagingSenderId: "832870643730",
    appId: "1:832870643730:web:ff17abcb9652a4acd2c0cb"
};

// TERI ASLI RAZORPAY KEY
const RAZORPAY_KEY = "rzp_test_SZjeJci3fwjpfS"; 

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- AUTH SYSTEM ---
let isLogin = true;
function toggleMode() {
    isLogin = !isLogin;
    document.getElementById('auth-title').innerText = isLogin ? "PLAYER LOGIN" : "CREATE ACCOUNT";
    document.getElementById('mode-text').innerText = isLogin ? "New Warrior? Create Account" : "Back to Login";
}

function handleAuth() {
    const ph = document.getElementById('u-phone').value;
    const ps = document.getElementById('u-pass').value;
    if(ph.length < 10) return alert("Bhai, 10 digit ka number dalo!");
    const email = ph + "@miki.com";

    if(isLogin) {
        auth.signInWithEmailAndPassword(email, ps).then(r => startApp(r.user)).catch(e => alert("Access Denied!"));
    } else {
        auth.createUserWithEmailAndPassword(email, ps).then(r => { 
            alert("Account Ready! Login Now."); 
            toggleMode(); 
        }).catch(e => alert("Error: " + e.message));
    }
}

async function startApp(user) {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');

    const uRef = db.collection("Users").doc(user.uid);
    const snap = await uRef.get();
    
    if(!snap.exists) {
        await uRef.set({ phone: user.email.split('@')[0], wallet_balance: 0, uid: user.uid });
    }

    uRef.onSnapshot(doc => {
        if(doc.exists) {
            document.getElementById('bal').innerText = "₹" + (doc.data().wallet_balance || 0);
            document.getElementById('display-phone').innerText = "PLAYER ID: " + doc.data().phone;
        }
    });
    loadMatches();
}

// --- DASHBOARD & MATCH LOGIC ---
function loadMatches() {
    db.collection("Matches").onSnapshot(snap => {
        let h = "";
        snap.forEach(d => {
            const m = d.data();
            const typeLabel = m.type || "Solo";
            h += `<div class="match-card">
                <span class="type-tag">${typeLabel}</span>
                <div class="match-title">${m.title}</div>
                <div class="match-details">
                    <div>Entry: <span class="fee-tag">₹${m.entryFee || 0}</span></div>
                    <div>Prize: <span class="prize-tag">${m.prize1 || m.prize || 'N/A'}</span></div>
                </div>
                <button class="btn" style="margin-top:10px; padding:10px;" onclick="joinMatch('${d.id}', ${m.entryFee}, '${typeLabel}')">JOIN MISSION</button>
                ${m.roomId ? `<div style="background:rgba(255,255,0,0.1); padding:10px; margin-top:10px; color:#ffca28; font-size:11px; border:1px solid #ffca28; border-radius:8px; text-align:center; z-index:1; position:relative;">
                    ROOM ID: ${m.roomId} | PASS: ${m.password || m.pasword}
                </div>` : ''}
            </div>`;
        });
        document.getElementById('match-list').innerHTML = h || "No Active Missions.";
    });
}

// JOINING LOGIC (SOLO & SQUAD)
async function joinMatch(mid, fee, type) {
    const user = auth.currentUser;
    const uRef = db.collection("Users").doc(user.uid);
    const snap = await uRef.get();
    const currentBal = snap.data().wallet_balance || 0;

    if(currentBal < fee) return alert("Insufficient Credits! Need ₹" + fee);

    let playersList = [];
    if(type.toLowerCase() === "squad") {
        alert("SQUAD MODE: Enter details for 4 Warriors.");
        for(let i=1; i<=4; i++) {
            let n = prompt(`Player ${i} Name:`);
            let u = prompt(`Player ${i} UID:`);
            if(!n || !u) return alert("Sari details bharna zaroori hai!");
            playersList.push({ playerName: n, playerUid: u });
        }
    } else {
        let n = prompt("Game Name:");
        let u = prompt("Game UID:");
        let l = prompt("Game Level:");
        if(!n || !u) return alert("Name & UID required!");
        playersList.push({ playerName: n, playerUid: u, playerLevel: l });
    }

    if(!confirm(`₹${fee} will be deducted. Proceed?`)) return;

    try {
        await uRef.update({ wallet_balance: currentBal - fee });
        await db.collection("Matches").doc(mid).collection("Players").doc(user.uid).set({
            players: playersList,
            joinedByPhone: snap.data().phone,
            payment: "PAID",
            type: type,
            timestamp: new Date().toLocaleString()
        });
        alert("✅ MISSION JOINED! Victory awaits.");
    } catch (e) { alert("Error: " + e.message); }
}

// RAZORPAY AUTO-ADD CASH
async function openPaymentGateway() {
    const amt = prompt("Enter Amount to Add (Min: ₹50)", "50");
    if(!amt || parseInt(amt) < 50) return alert("Bhai, Minimum ₹50 dalo!");

    const user = auth.currentUser;
    const uRef = db.collection("Users").doc(user.uid);
    const snap = await uRef.get();

    var options = {
        "key": RAZORPAY_KEY,
        "amount": parseInt(amt) * 100,
        "currency": "INR",
        "name": "MIKI ESPORTS",
        "description": "Wallet Recharge",
        "handler": async function (response){
            await uRef.update({ wallet_balance: firebase.firestore.FieldValue.increment(parseInt(amt)) });
            alert("✅ ₹" + amt + " Credits Added!");
        },
        "prefill": { "contact": snap.data().phone },
        "theme": { "color": "#00f2fe" }
    };
    var rzp1 = new Razorpay(options);
    rzp1.open();
}

// --- ADMIN CONTROLS ---
let secretCount = 0;
document.getElementById('admin-trigger').onclick = () => {
    secretCount++;
    if(secretCount === 7) {
        if(prompt("Enter Admin Access Key:") === "Priyanshu7") {
            document.getElementById('admin-panel').classList.toggle('hidden');
        }
        secretCount = 0;
    }
};

async function addCash() {
    const ph = document.getElementById('t-uid').value;
    const amt = parseInt(document.getElementById('a-amt').value);
    if(!ph || !amt) return alert("Enter details!");
    
    const q = await db.collection("Users").where("phone", "==", ph).get();
    if(q.empty) return alert("❌ Number not registered!");
    
    await q.docs[0].ref.update({ wallet_balance: firebase.firestore.FieldValue.increment(amt) });
    alert(`🔥 Done! ₹${amt} added to ${ph}`);
}

async function updateRoom() {
    const mid = document.getElementById('m-id').value;
    const rid = document.getElementById('r-id').value;
    const rps = document.getElementById('r-ps').value;
    if(!mid) return alert("Match ID required!");
    await db.collection("Matches").doc(mid).update({ roomId: rid, password: rps });
    alert("Room Details Pushed!");
}

async function viewPlayers() {
    const mid = document.getElementById('v-mid').value;
    if(!mid) return alert("Match ID required!");
    
    db.collection("Matches").doc(mid).collection("Players").onSnapshot(snap => {
        let h = "";
        snap.forEach(p => {
            const d = p.data();
            d.players.forEach(pl => {
                h += `<tr><td>${pl.playerName}</td><td>${pl.playerUid}</td><td>${pl.playerLevel || 'N/A'}</td><td style="color:#0f8; font-weight:bold;">PAID</td></tr>`;
            });
        });
        document.getElementById('p-list').innerHTML = h || "<tr><td colspan='4'>No players yet.</td></tr>";
        document.getElementById('players-table-area').classList.remove('hidden');
    });
}
</script>
</body>
</html>
