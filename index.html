<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF LEGEND | PRIME MIKU PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --blue: #00d4ff; --dark: #07070a; --card: #12121a; --red: #ff4d4d; --green: #22c55e; }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; margin: 0; user-select: none; }
        #loader { position: fixed; inset: 0; background: #000; z-index: 10001; display: flex; align-items: center; justify-content: center; }
        nav { background: #000; padding: 12px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { color: #888; cursor: pointer; font-size: 10px; font-weight: bold; text-transform: uppercase; font-family: 'Orbitron'; }
        .nav-btn.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        .container { padding: 15px; max-width: 450px; margin: auto; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .match-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; font-family: 'Orbitron'; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: var(--blue); color: black; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .timer { font-family: 'Orbitron'; color: var(--red); font-size: 14px; font-weight: bold; margin: 10px 0; }
        .room-box { background: #1a1a24; border: 1px dashed var(--blue); padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 12px; }
        .history-card { background: #0f0f15; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #222; display: flex; justify-content: space-between; }
        #adm-nav, #admin-pan { display: none !important; }
    </style>
</head>
<body>

    <div id="loader"><div style="width:40px; height:40px; border:4px solid #222; border-top-color:var(--gold); border-radius:50%; animation:spin 1s linear infinite;"></div></div>

    <div id="main-app" style="display:none;">
        <nav>
            <div class="nav-btn active" onclick="switchS('home', this)">MATCHES</div>
            <div class="nav-btn" onclick="switchS('profile', this)">PROFILE</div>
            <div class="nav-btn" id="adm-nav" onclick="switchS('admin-pan', this)">ADMIN</div>
        </nav>

        <div id="home" class="section active">
            <div class="container">
                <div style="background:#000; padding:10px; border-radius:10px; margin-bottom:15px; display:flex; justify-content:space-between;">
                    <span>Balance: <b id="w-amt" style="color:var(--green)">₹0</b></span>
                    <span id="p-sid" style="color:var(--blue); font-size:10px;">FFL-0000</span>
                </div>
                <div id="match-ui"></div>
            </div>
        </div>

        <div id="profile" class="section">
            <div class="container">
                <h3 style="font-family:'Orbitron'; color:var(--gold);">MATCH HISTORY</h3>
                <div id="history-ui"></div>
                <hr style="border:1px solid #222; margin:20px 0;">
                <button class="btn btn-blue" onclick="switchS('deposit', null)">DEPOSIT CASH</button>
                <button onclick="auth.signOut()" class="btn" style="background:none; color:#555;">Logout</button>
            </div>
        </div>

        <div id="deposit" class="section">
            <div class="container">
                <div class="match-card" style="border-left-color:var(--green); text-align:center;">
                    <h4>SCAN & PAY</h4>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=mrbituyr-1@okicici&pn=PrimeMiku&am=20" style="background:white; padding:5px; border-radius:10px;">
                    <p style="color:var(--gold); margin:10px 0;">mrbituyr-1@okicici</p>
                    <input type="text" id="u-utr" placeholder="Enter 12 Digit UTR">
                    <button class="btn btn-gold" onclick="submitUTR()">SUBMIT PAYMENT</button>
                </div>
            </div>
        </div>

        <div id="admin-pan" class="section">
            <div class="container">
                <h3 style="font-family:'Orbitron'; color:var(--gold);">OWNER CONTROL</h3>
                <div class="match-card">
                    <h4>New Match</h4>
                    <input type="text" id="mt" placeholder="Title">
                    <input type="number" id="mf" placeholder="Fee">
                    <input type="datetime-local" id="mti" placeholder="Match Date Time">
                    <button class="btn btn-gold" onclick="admMatch()">PUBLISH</button>
                </div>
                <div class="match-card" style="border-left-color:var(--blue)">
                    <h4>Live Match Management</h4>
                    <div id="adm-live-ui"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="auth-screen" style="display:flex; height:100vh; align-items:center; justify-content:center; background:#000;">
        <div style="background:var(--card); padding:30px; border-radius:20px; border:1px solid var(--gold); text-align:center;">
            <h2 style="color:var(--gold); font-family:'Orbitron';">FF LEGEND</h2>
            <input type="email" id="le" placeholder="Email"><br>
            <input type="password" id="lp" placeholder="Password"><br>
            <button class="btn btn-gold" onclick="login()">LOGIN</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAFvaJjgrPghBwx5FPFeLPc0XCi6GFNA1k", authDomain: "ff-legend-tournament.firebaseapp.com", projectId: "ff-legend-tournament", storageBucket: "ff-legend-tournament.firebasestorage.app", messagingSenderId: "648355009637", appId: "1:648355009637:web:2a7b87b72566a129ae228c" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        auth.onAuthStateChanged(async u => {
            document.getElementById('loader').style.display='none';
            if(u){
                document.getElementById('auth-screen').style.display='none';
                document.getElementById('main-app').style.display='block';
                const d = await db.collection("users").doc(u.uid).get();
                if(d.data().isAdmin) { document.getElementById('adm-nav').style.setProperty('display','block','important'); loadAdm(); }
                document.getElementById('p-sid').innerText = d.data().siteID;
                sync(u.uid); loadM();
            }
        });

        // LOAD MATCHES WITH TIMER
        function loadM(){
            db.collection("matches").onSnapshot(s => {
                const l = document.getElementById('match-ui'); l.innerHTML = "";
                s.forEach(d => {
                    const data = d.data();
                    const mTime = new Date(data.time).getTime();
                    const isJoined = data.players.some(p => p.uid === auth.currentUser.uid);
                    
                    l.innerHTML += `
                        <div class="match-card">
                            <h4>${data.title}</h4>
                            <div class="timer" id="timer-${d.id}">Calculating...</div>
                            <p style="font-size:12px;">Fee: ₹${data.fee}</p>
                            ${isJoined ? `<div class="room-box">Room ID: ${data.roomId || '********'}<br>Pass: ${data.roomPass || '********'}</div>` : `<button class="btn btn-gold" id="btn-${d.id}" onclick="joinM('${d.id}',${data.fee})">JOIN MATCH</button>`}
                            <p style="font-size:9px; color:#666;">Room Details will be visible 10 mins before start to joined players only.</p>
                        </div>
                    `;
                    startTimer(mTime, d.id);
                });
            });
        }

        function startTimer(target, id) {
            const intv = setInterval(() => {
                const now = new Date().getTime();
                const dist = target - now;
                const el = document.getElementById(`timer-${id}`);
                const btn = document.getElementById(`btn-${id}`);
                
                if (dist < 0) {
                    clearInterval(intv);
                    if(el) el.innerText = "MATCH LIVE";
                    if(btn) { btn.disabled = true; btn.innerText = "CLOSED"; }
                    return;
                }

                const h = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((dist % (1000 * 60)) / 1000);
                if(el) el.innerText = `Starts In: ${h}h ${m}m ${s}s`;
            }, 1000);
        }

        // ADMIN FUNCTIONS
        async function admMatch(){
            await db.collection("matches").add({
                title: document.getElementById('mt').value,
                fee: parseInt(document.getElementById('mf').value),
                time: document.getElementById('mti').value,
                players: [], roomId: "", roomPass: ""
            }); alert("Live!");
        }

        function loadAdm(){
            db.collection("matches").onSnapshot(s => {
                const l = document.getElementById('adm-live-ui'); l.innerHTML = "";
                s.forEach(d => {
                    const data = d.data();
                    let pList = "";
                    data.players.forEach((p, index) => {
                        pList += `<div>${p.name} <input type="number" placeholder="Kills" onchange="updateKills('${d.id}','${p.uid}', this.value)" style="width:60px; padding:2px;"></div>`;
                    });
                    l.innerHTML += `
                        <div style="background:#000; padding:10px; margin-bottom:10px; border-radius:10px;">
                            <b>${data.title}</b>
                            <input type="text" placeholder="Room ID" id="rid-${d.id}" value="${data.roomId}">
                            <input type="text" placeholder="Room Pass" id="rps-${d.id}" value="${data.roomPass}">
                            <button class="btn btn-blue" style="padding:5px;" onclick="setRoom('${d.id}')">UPDATE ROOM</button>
                            <div style="margin-top:10px;">${pList}</div>
                        </div>
                    `;
                });
            });
        }

        async function setRoom(id){
            await db.collection("matches").doc(id).update({
                roomId: document.getElementById(`rid-${id}`).value,
                roomPass: document.getElementById(`rps-${id}`).value
            }); alert("Room Updated!");
        }

        async function updateKills(mId, pUid, kills){
            // Logic to update kill history in user document
            await db.collection("users").doc(pUid).collection("history").doc(mId).set({
                matchId: mId,
                kills: kills,
                date: new Date().toLocaleDateString()
            });
        }

        function sync(uid){
            db.collection("users").doc(uid).onSnapshot(d => { document.getElementById('w-amt').innerText = "₹"+d.data().wallet; });
            db.collection("users").doc(uid).collection("history").onSnapshot(s => {
                const h = document.getElementById('history-ui'); h.innerHTML = "";
                s.forEach(d => {
                    h.innerHTML += `<div class="history-card"><span>Date: ${d.data().date}</span> <b style="color:var(--gold)">Kills: ${d.data().kills}</b></div>`;
                });
            });
        }

        // Standard Login/Join functions as before...
        async function login(){ try{await auth.signInWithEmailAndPassword(document.getElementById('le').value,document.getElementById('lp').value);}catch(e){alert("Error");}}
        async function joinM(id,f){
            const d=await db.collection("users").doc(auth.currentUser.uid).get();
            if(d.data().wallet < f) return alert("Low Balance!");
            const ffid = prompt("FF UID:"); if(!ffid) return;
            await db.collection("users").doc(auth.currentUser.uid).update({wallet:firebase.firestore.FieldValue.increment(-f)});
            await db.collection("matches").doc(id).update({players:firebase.firestore.FieldValue.arrayUnion({name:d.data().name, uid:auth.currentUser.uid, ffid:ffid})});
        }
        function switchS(id, el){ document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); if(el){ document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); }}
    </script>
</body>
</html>
