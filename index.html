<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIKI ESPORTS | THE CORE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        :root { --main: #00f2fe; --accent: #ff0055; --bg: #06090f; --card: #111827; --gold: #ffd700; --danger: #ff0000; --success: #0f8; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; user-select: none; overflow-x: hidden; }
        
        /* Premium Header */
        .header { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 12px 20px; border-bottom: 2px solid var(--main); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo-img { width: 35px; height: 35px; background: linear-gradient(45deg, var(--main), var(--accent)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; box-shadow: 0 0 15px var(--main); }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #1f2937; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }

        /* --- CSS SKULL VAULT --- */
        #skull-vault { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 2000; display:none; flex-direction:column; align-items:center; justify-content:center; }
        .fog { position: absolute; width:100%; height:100%; background: radial-gradient(circle, rgba(255,0,0,0.25) 0%, transparent 70%); animation: pulse 2s infinite; pointer-events: none; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }

        /* The Pure CSS Skull */
        .skull { position: relative; width: 120px; height: 130px; background: #eee; border-radius: 60px 60px 40px 40px; margin-bottom: 30px; box-shadow: 0 0 30px rgba(255,255,255,0.2); animation: float 3s infinite ease-in-out; transition: 0.5s; }
        .skull::before { content: ''; position: absolute; width: 70px; height: 50px; background: #eee; bottom: -25px; left: 25px; border-radius: 0 0 20px 20px; }
        .skull-teeth { position: absolute; bottom: -20px; left: 35px; width: 50px; height: 15px; display: flex; gap: 5px; z-index: 2; }
        .skull-teeth span { width: 6px; height: 100%; background: #333; border-radius: 2px; }
        
        .eye { position: absolute; width: 25px; height: 30px; background: #111; border-radius: 50%; top: 45px; transition: 0.3s; }
        .eye.l { left: 25px; transform: rotate(10deg); }
        .eye.r { right: 25px; transform: rotate(-10deg); }
        .eye-glow { position: absolute; width: 8px; height: 8px; border-radius: 50%; top: 40%; left: 30%; background: transparent; transition: 0.3s; }
        
        /* Nose */
        .nose { position: absolute; width: 15px; height: 15px; background: #111; bottom: 35px; left: 52px; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }

        /* Animation Classes */
        .wrong-pass .eye-glow { background: #f00; box-shadow: 0 0 15px 5px #f00; }
        .correct-pass .eye-glow { background: #0f8; box-shadow: 0 0 15px 5px #0f8; }
        .broken { transform: scale(1.2) rotate(10deg); opacity: 0; filter: blur(10px); }

        .vault-input { background: rgba(255,0,0,0.05) !important; border: 2px solid #331111 !important; color: #ff4444 !important; text-align: center; font-size: 20px; letter-spacing: 5px; width: 70% !important; border-radius: 10px; margin-bottom: 20px; outline: none; }
        
        /* Dashboard & Buttons */
        .reward-card { background: linear-gradient(145deg, #1e1b4b, #0f172a); border: 1px solid var(--gold); }
        .progress-box { background: rgba(0,0,0,0.5); height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: 1s; box-shadow: 0 0 10px var(--gold); }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-main { background: linear-gradient(45deg, var(--main), #3b82f6); color: #000; }
        .btn-logout { background: transparent; border: 1px solid #374151; color: #9ca3af; margin-top: 20px; font-size: 11px; }

        .hidden { display: none !important; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>

<div id="skull-vault">
    <div class="fog"></div>
    <div class="skull" id="css-skull">
        <div class="eye l"><div class="eye-glow"></div></div>
        <div class="eye r"><div class="eye-glow"></div></div>
        <div class="nose"></div>
        <div class="skull-teeth"><span></span><span></span><span></span><span></span></div>
    </div>
    <h2 style="color:var(--danger); letter-spacing:3px; text-shadow:0 0 10px red;" id="status-txt">RESTRICTED</h2>
    <input type="password" id="vault-pass" class="vault-input" placeholder="••••">
    <button class="btn btn-main" style="width:70%;" onclick="checkVault()">UNLOCK CORE</button>
    <button class="btn-logout" style="border:none;" onclick="hideVault()">EXIT</button>
</div>

<div class="header">
    <div style="display:flex; align-items:center; gap:10px;">
        <div class="logo-img">M</div>
        <div style="font-weight:900; color:var(--main);">MIKI ESPORTS</div>
    </div>
    <div style="display:flex; gap:15px; align-items:center;">
        <a href="https://www.instagram.com/_prime_miku_?igsh=Y296bXdpZGl5dzFs" target="_blank" style="text-decoration:none; font-size:20px;">📸</a>
        <div id="admin-trigger" style="font-size:22px; cursor:pointer;">🏆</div>
    </div>
</div>

<div class="container">
    <div id="auth-section" class="card hidden" style="text-align:center;">
        <h3>PLAYER LOGIN</h3>
        <input type="number" id="u-phone" placeholder="Mobile Number">
        <input type="password" id="u-pass" placeholder="Password">
        <button class="btn btn-main" onclick="handleAuth()">LOGIN</button>
        <p style="font-size:11px; color:#666; margin-top:10px; cursor:pointer;" onclick="toggleMode()">Create Account</p>
    </div>

    <div id="dashboard" class="hidden">
        <div class="card reward-card">
            <div style="color:var(--gold); font-weight:bold; font-size:14px;">🎁 LOYALTY REWARD (₹29)</div>
            <div class="progress-box"><div class="progress-fill" id="reward-progress"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:10px; color:#94a3b8;">
                <span id="match-count-txt">Played: 0/20</span>
                <span>Get Google Play Code</span>
            </div>
            <button class="btn" id="claim-btn" style="background:#1e2937; color:#4b5563; margin-top:10px;" disabled onclick="claimReward()">CLAIM CODE</button>
        </div>

        <div class="card" style="display:flex; justify-content:space-between; align-items:center; border: 1px solid #334155;">
            <div><small style="color:#64748b;">WALLET</small><div id="bal" style="font-size:24px; font-weight:900; color:var(--main);">₹0</div></div>
            <button onclick="document.getElementById('deposit-page').classList.remove('hidden')" class="btn btn-main" style="width:auto; padding:8px 12px; margin:0;">+ ADD</button>
        </div>

        <h4>MATCHES</h4>
        <div id="match-list">Loading...</div>
        <button class="btn btn-logout" onclick="logoutPlayer()">🚪 LOGOUT</button>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="card" style="border-color: var(--danger); background: #000;">
            <h3 style="color:var(--danger);">MASTER ADMIN</h3>
            <input type="text" id="m-id" placeholder="Match ID">
            <input type="text" id="m-time" placeholder="Time">
            <input type="text" id="r-id" placeholder="Room ID">
            <input type="text" id="r-ps" placeholder="Room Pass">
            <button class="btn btn-main" onclick="updateRoom()">UPDATE</button>
            <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
            <input type="text" id="t-uid" placeholder="Phone">
            <input type="number" id="a-amt" placeholder="Amount">
            <button class="btn btn-main" onclick="addCash()">ADD CASH</button>
        </div>
    </div>
</div>

<div id="deposit-page" class="full-overlay hidden"><div class="modal-box"><h3>ADD CASH</h3><input type="number" id="dep-amt" placeholder="Min ₹40"><button class="btn btn-main" onclick="processDeposit()">PAY</button><button class="btn-logout" style="border:none;" onclick="document.getElementById('deposit-page').classList.add('hidden')">CANCEL</button></div></div>
<div id="join-page" class="full-overlay hidden"><div class="modal-box"><h3>JOIN MATCH</h3><input type="text" id="p-name" placeholder="FF Name"><input type="text" id="p-uid" placeholder="FF UID"><div style="color:#0f8; font-weight:bold; margin:10px 0;">FEE: ₹10</div><button class="btn btn-main" onclick="submitJoinRequest()">PAY ₹10</button><button class="btn-logout" style="border:none;" onclick="document.getElementById('join-page').classList.add('hidden')">CANCEL</button></div></div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = { apiKey: "AIzaSyDiVgQ-FMis2N77nHu6dTY17aTPpmBrNL4", authDomain: "miki-turnament-93d48.firebaseapp.com", projectId: "miki-turnament-93d48", storageBucket: "miki-turnament-93d48.firebasestorage.app", messagingSenderId: "832870643730", appId: "1:832870643730:web:ff17abcb9652a4acd2c0cb" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- SOUND FUNCTION ---
function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.pitch = 0.1; // Scary low pitch
    speech.rate = 0.8;
    speech.volume = 1;
    window.speechSynthesis.speak(speech);
}

// --- ADMIN VAULT ---
let clicks = 0;
document.getElementById('admin-trigger').onclick = () => { clicks++; if(clicks === 7) { clicks = 0; showVault(); } };

function showVault() {
    const v = document.getElementById('skull-vault');
    v.style.display = 'flex';
    document.getElementById('css-skull').className = 'skull';
    speak("Hello Prime Miku. Welcome to the master login. Enter password.");
}
function hideVault() { document.getElementById('skull-vault').style.display = 'none'; }

function checkVault() {
    const p = document.getElementById('vault-pass').value;
    const s = document.getElementById('css-skull');
    const t = document.getElementById('status-txt');

    if(p === "Priyanshu7") {
        s.classList.add('correct-pass');
        t.innerText = "GRANTED";
        t.style.color = "var(--success)";
        speak("Access Granted.");
        setTimeout(() => {
            s.classList.add('broken');
            setTimeout(() => {
                hideVault();
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }, 600);
        }, 1000);
    } else {
        s.classList.add('wrong-pass');
        t.innerText = "DENIED";
        speak("Wrong password. Terminating session.");
        setTimeout(() => {
            hideVault();
            document.getElementById('vault-pass').value = "";
        }, 2000);
    }
}

// --- CORE APP ---
auth.onAuthStateChanged(user => { if(user) startApp(user); else document.getElementById('auth-section').classList.remove('hidden'); });

async function startApp(user) {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    const uRef = db.collection("Users").doc(user.uid);
    const snap = await uRef.get();
    if(!snap.exists) await uRef.set({ phone: user.email.split('@')[0], wallet_balance: 0, match_played: 0 });
    uRef.onSnapshot(doc => { 
        const d = doc.data();
        document.getElementById('bal').innerText = "₹" + (d.wallet_balance || 0);
        const count = d.match_played || 0;
        document.getElementById('reward-progress').style.width = (count/20)*100 + "%";
        document.getElementById('match-count-txt').innerText = `Played: ${count}/20`;
        if(count >= 20) { document.getElementById('claim-btn').disabled = false; document.getElementById('claim-btn').style.background = "var(--gold)"; }
    });
    loadMatches();
}

async function loadMatches() {
    db.collection("Matches").onSnapshot(snap => {
        let h = "";
        snap.forEach(async (d) => {
            const m = d.data(), mid = d.id;
            const pSnap = await db.collection("Matches").doc(mid).collection("Players").doc(auth.currentUser.uid).get();
            const joined = pSnap.exists;
            h += `<div class="match-card">
                <div class="time-badge">⏰ ${m.time || 'TBA'}</div>
                <div style="font-weight:900; color:var(--main); font-size:18px;">${m.title || 'SOLO MISSION'}</div>
                <div style="font-size:12px; color:#64748b; margin:5px 0;">ENTRY: ₹10 | PRIZE: ${m.prize || '₹50'}</div>
                <span style="color:#0f8; font-size:11px;">🎯 Per Kill: ₹5</span>
                ${joined ? `<button class="btn" style="background:#0f81; color:#0f8; border:1px solid #0f8;">JOINED ✅</button>` : `<button class="btn btn-main" onclick="openJoin('${mid}')">JOIN MISSION</button>`}
                <div class="room-info">${joined ? (m.roomId ? `ID: ${m.roomId} | PASS: ${m.password}` : 'Wait for Room') : '🔒 Join to see Room'}</div>
            </div>`;
        });
        document.getElementById('match-list').innerHTML = h || "No Matches.";
    });
}

function openJoin(mid) { activeMid = mid; document.getElementById('join-page').classList.remove('hidden'); }
async function submitJoinRequest() {
    const name = document.getElementById('p-name').value, puid = document.getElementById('p-uid').value;
    const uRef = db.collection("Users").doc(auth.currentUser.uid);
    const snap = await uRef.get();
    if(snap.data().wallet_balance < 10) return alert("Low balance!");
    await uRef.update({ wallet_balance: firebase.firestore.FieldValue.increment(-10), match_played: firebase.firestore.FieldValue.increment(1) });
    await db.collection("Matches").doc(activeMid).collection("Players").doc(auth.currentUser.uid).set({ players: [{playerName: name, playerUid: puid}] });
    document.getElementById('join-page').classList.add('hidden');
    alert("Joined!");
}

async function processDeposit() {
    const amt = parseInt(document.getElementById('dep-amt').value);
    if(amt < 40) return alert("Min ₹40!");
    await db.collection("Users").doc(auth.currentUser.uid).update({ wallet_balance: firebase.firestore.FieldValue.increment(amt) });
    alert("Done!"); document.getElementById('deposit-page').classList.add('hidden');
}

function handleAuth() { const ph = document.getElementById('u-phone').value, ps = document.getElementById('u-pass').value; auth.signInWithEmailAndPassword(ph + "@miki.com", ps).catch(e => alert(e.message)); }
function toggleMode() { /* Same as before */ }
function logoutPlayer() { auth.signOut().then(() => location.reload()); }
async function addCash() { const ph = document.getElementById('t-uid').value, amt = parseInt(document.getElementById('a-amt').value); let q = await db.collection("Users").where("phone", "==", ph).get(); if(!q.empty) await q.docs[0].ref.update({ wallet_balance: firebase.firestore.FieldValue.increment(amt) }); }
async function updateRoom() { const mid = document.getElementById('m-id').value; await db.collection("Matches").doc(mid).set({ time: document.getElementById('m-time').value, roomId: document.getElementById('r-id').value, password: document.getElementById('r-ps').value }, { merge: true }); alert("Updated!"); }
</script>
</body>
</html>
