<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ET-PRO | Smart Wallet System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --success: #22c55e; --error: #ef4444; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Glassmorphism Navbar */
        nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #334155; }
        .logo { font-size: 1.6rem; font-weight: 900; color: var(--primary); text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .wallet-display { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--success); padding: 5px 15px; border-radius: 30px; color: var(--success); font-weight: bold; }

        .container { max-width: 600px; margin: auto; padding: 20px; }

        /* Tournament Card */
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); }
        
        .btn-action { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-action:disabled { background: #475569; cursor: not-allowed; }

        /* UTR Modal */
        #utrModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: var(--card); padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--primary); }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; text-align: center; font-size: 1.1rem; box-sizing: border-box; }
        
        .status-msg { margin-top: 10px; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ET-PRO</div>
        <div class="wallet-display">Wallet: ₹<span id="balance">0</span></div>
    </nav>

    <div class="container">
        <div class="card" style="border-color: var(--success);">
            <h3 style="margin-top: 0; color: var(--success);"><i class="fas fa-wallet"></i> Quick Deposit</h3>
            <p style="font-size: 0.9rem; color: #94a3b8;">Pay using any UPI App & enter UTR below.</p>
            <div style="background: #0f172a; padding: 10px; border-radius: 10px; border: 1px dashed #22c55e; margin-bottom: 10px;">
                <span style="font-size: 0.8rem; display: block;">UPI ID:</span>
                <strong id="myUpi">yourname@upi</strong>
            </div>
            <button class="btn-action" onclick="openUtrModal()" style="background: var(--success);">Add Money / Verify UTR</button>
        </div>

        <div class="section-header" style="margin: 20px 0 10px; font-weight: bold; color: #64748b;">LIVE TOURNAMENTS</div>

        <div class="card">
            <div style="display: flex; justify-content: space-between;">
                <div>
                    <h4 style="margin:0;">Bermuda Classic (Solo)</h4>
                    <span style="font-size: 0.8rem; color: #94a3b8;">Entry: ₹10 | Per Kill: ₹5</span>
                </div>
                <button class="btn-action" id="joinBtn" onclick="joinMatch(10)" style="width: auto; padding: 5px 25px;">JOIN</button>
            </div>
        </div>
    </div>

    <div id="utrModal">
        <div class="modal-box">
            <h3 style="margin-top: 0;">Verify Payment</h3>
            <p style="font-size: 0.8rem; color: #94a3b8;">Enter 12-digit UTR/Ref Number from your payment receipt</p>
            
            <input type="number" id="utrInput" placeholder="Enter 12 Digit UTR" oninput="limitUTR(this)">
            <div id="status" class="status-msg"></div>
            
            <button class="btn-action" id="verifyBtn" onclick="verifyUTR()">VERIFY & ADD ₹10</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#64748b; margin-top:15px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        let walletBalance = 0;
        let usedUTRs = ["123456789012"]; // Demo ke liye ek used UTR

        function limitUTR(element) {
            if (element.value.length > 12) element.value = element.value.slice(0, 12);
        }

        function openUtrModal() {
            document.getElementById('utrModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('utrModal').style.display = 'none';
            document.getElementById('status').innerText = "";
        }

        function verifyUTR() {
            const utr = document.getElementById('utrInput').value;
            const status = document.getElementById('status');
            const verifyBtn = document.getElementById('verifyBtn');

            if (utr.length !== 12) {
                status.innerText = "❌ Invalid UTR! Must be 12 digits.";
                status.style.color = "var(--error)";
                return;
            }

            if (usedUTRs.includes(utr)) {
                status.innerText = "❌ UTR Already Used!";
                status.style.color = "var(--error)";
                return;
            }

            // Simulating Verification
            verifyBtn.innerText = "Verifying...";
            verifyBtn.disabled = true;

            setTimeout(() => {
                walletBalance += 10;
                usedUTRs.push(utr); // Save UTR so it can't be used again
                document.getElementById('balance').innerText = walletBalance;
                
                status.innerText = "✅ ₹10 Added Successfully!";
                status.style.color = "var(--success)";
                
                setTimeout(() => {
                    closeModal();
                    verifyBtn.innerText = "VERIFY & ADD ₹10";
                    verifyBtn.disabled = false;
                    document.getElementById('utrInput').value = "";
                }, 1500);
            }, 2000);
        }

        function joinMatch(fee) {
            if (walletBalance >= fee) {
                walletBalance -= fee;
                document.getElementById('balance').innerText = walletBalance;
                alert("Successfully Joined the Match!");
                document.getElementById('joinBtn').innerText = "JOINED";
                document.getElementById('joinBtn').disabled = true;
            } else {
                alert("Insufficient Balance! Please add money first.");
                openUtrModal();
            }
        }
    </script>
</body>
</html>
