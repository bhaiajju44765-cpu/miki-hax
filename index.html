<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIKI ESPORTS | SECURE PAY</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        :root { --main: #00f2fe; --accent: #ff0055; --bg: #010205; --card: #0d1117; --danger: #ff0000; --success: #00ff88; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; user-select: none; overflow-x: hidden; }
        
        .header { background: rgba(0,0,0,0.95); padding: 15px 20px; border-bottom: 2px solid var(--main); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo-img { width: 40px; height: 40px; background: linear-gradient(45deg, var(--main), var(--accent)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; box-shadow: 0 0 15px var(--main); }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .auth-card { background: linear-gradient(145deg, #111827, #030712); padding: 30px; border-radius: 24px; border: 1px solid #1f2937; text-align: center; margin-top: 40px; }
        input { width: 100%; padding: 16px; margin: 10px 0; background: #161b22; border: 1px solid #30363d; color: #fff; border-radius: 12px; outline: none; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 5px; }
        
        /* RAZORPAY PRIMARY STYLE */
        .btn-razor { background: linear-gradient(45deg, #3399ff, var(--main)); color: #000; box-shadow: 0 0 20px rgba(0,242,254,0.5); border: 2px solid #fff; }
        .btn-wallet { background: #1f2937; color: #64748b; border: 1px solid #333; font-size: 12px; }
        .btn-upi-manual { background: transparent; color: #444; font-size: 10px; margin-top: 15px; text-decoration: underline; }

        .match-card { background: #161b22; border-radius: 20px; border-left: 6px solid var(--main); padding: 20px; margin-bottom: 20px; position: relative; }
        .slots-tag { position: absolute; top: 15px; right: 15px; background: rgba(255,0,85,0.1); color: var(--accent); padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; border: 1px solid var(--accent); }

        #face-vault { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .camera-circle { width: 200px; height: 200px; border-radius: 50%; border: 4px solid var(--danger); overflow: hidden; position: relative; }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        .hidden { display: none !important; }
        .full-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1500; display: flex; align-items: center; justify-content: center; overflow-y: auto; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 24px; width: 90%; border: 1px solid var(--main); text-align: center; margin: 50px 0; }
    </style>
</head>
<body>

<div id="face-vault">
    <div class="camera-circle"><video id="webcam" autoplay playsinline></video></div>
    <h2 style="color:var(--danger); margin-top:20px;">COMMANDER SCAN</h2>
    <input type="password" id="vault-pass" style="width:70%; text-align:center; color:red; background:black; border:2px solid red; font-size:24px;" placeholder="••••">
    <button class="btn btn-razor" style="color:#fff;" onclick="verifyGod()">UNLOCK SYSTEM</button>
</div>

<div class="header">
    <div style="display:flex; align-items:center; gap:10px;"><div class="logo-img">M</div><div style="font-weight:900; color:var(--main); font-size: 20px;">MIKI ESPORTS</div></div>
    <div id="god-trigger" style="font-size:24px; cursor:pointer;">🏆</div>
</div>

<div class="container">
    <div id="login-page" class="auth-card hidden">
        <h2 style="color:var(--main);">LOGIN</h2>
        <input type="number" id="l-phone" placeholder="Mobile Number">
        <input type="password" id="l-pass" placeholder="Password">
        <button class="btn btn-razor" onclick="handleLogin()">ENTER ARENA</button>
        <div style="margin-top: 20px; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--main);">FREE FIRE TOURNAMENT LIVE 🔥</div>
    </div>

    <div id="register-page" class="auth-card hidden">
        <h2 style="color:var(--main);">REGISTER</h2>
        <input type="number" id="r-phone" placeholder="Mobile Number">
        <input type="password" id="r-pass" placeholder="Create Password">
        <button class="btn btn-razor" onclick="handleRegister()">CREATE IDENTITY</button>
    </div>

    <div id="dashboard" class="hidden">
        <div style="background:var(--card); padding:20px; border-radius:20px; border:1px solid #30363d; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
            <div><small style="color:#666;">BALANCE</small><div id="bal" style="font-size:26px; font-weight:900; color:var(--main);">₹0</div></div>
            <button onclick="document.getElementById('deposit-page').classList.remove('hidden')" class="btn btn-razor" style="width:auto; padding:8px 15px; font-size: 10px;">ADD CASH</button>
        </div>
        <div id="match-list">Scanning...</div>
        <button class="btn" style="background:#111; color:#444; margin-top:30px; font-size:10px;" onclick="auth.signOut().then(()=>location.reload())">LOGOUT</button>
    </div>

    <div id="god-panel" class="hidden">
        <div style="background:#000; padding:25px; border-radius:24px; border:2px solid red;">
            <h2 style="color:red; text-align:center;">SUPREME CONSOLE</h2>
            <input type="text" id="m-id" placeholder="Match ID (M1)">
            <input type="text" id="m-time" placeholder="Match Time">
            <input type="text" id="m-prize" placeholder="Prize">
            <input type="text" id="r-id" placeholder="Room ID">
            <input type="text" id="r-ps" placeholder="Room Pass">
            <button class="btn btn-razor" style="color:#fff;" onclick="pushMatch()">SAVE MISSION</button>
            <button class="btn" style="background:#1a1a1a; margin-top:10px;" onclick="location.reload()">EXIT</button>
        </div>
    </div>
</div>

<div id="join-page" class="full-overlay hidden">
    <div class="modal-box">
        <h3 style="color:var(--main);">JOIN MISSION</h3>
        <input type="text" id="p-name" placeholder="Free Fire Name">
        <input type="text" id="p-uid" placeholder="FF UID">
        
        <button class="btn btn-razor" onclick="initPay('join')">PAY ₹10 & JOIN (Fast & Safe)</button>
        
        <p style="font-size: 10px; color: #444; margin: 15px 0;">-- OTHER METHODS --</p>
        
        <button class="btn btn-wallet" id="wall-btn" onclick="payWithWallet()">PAY FROM WALLET (₹10)</button>
        
        <button class="btn btn-upi-manual" onclick="document.getElementById('upi-screen').classList.toggle('hidden')">Payment Problems? Use QR Code</button>

        <div id="upi-screen" class="hidden">
            <div style="background:#fff; padding:10px; border-radius:10px; margin:15px auto; width:120px; height:120px;">
                <img id="qr-img" style="width:100%;" src="">
            </div>
            <input type="number" id="utr-input" placeholder="Enter 12-Digit UTR">
            <button class="btn btn-razor" style="color:#fff;" onclick="autoJoinUTR()">VERIFY & JOIN</button>
        </div>

        <button class="btn" style="background:transparent; color:#555; margin-top: 15px;" onclick="location.reload()">CANCEL</button>
    </div>
</div>

<div id="deposit-page" class="full-overlay hidden"><div class="modal-box"><h3>RECHARGE</h3><input type="number" id="dep-amt" placeholder="Min ₹40"><button class="btn btn-razor" onclick="initPay('deposit')">PAY ONLINE</button><button class="btn" onclick="document.getElementById('deposit-page').classList.add('hidden')">CANCEL</button></div></div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDiVgQ-FMis2N77nHu6dTY17aTPpmBrNL4", authDomain: "miki-turnament-93d48.firebaseapp.com", projectId: "miki-turnament-93d48", storageBucket: "miki-turnament-93d48.firebasestorage.app", messagingSenderId: "832870643730", appId: "1:832870643730:web:ff17abcb9652a4acd2c0cb" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.firestore();

let userBal = 0, activeMid = "";
function showAuth(type) { document.getElementById('login-page').classList.toggle('hidden', type !== 'login'); document.getElementById('register-page').classList.toggle('hidden', type !== 'register'); }

auth.onAuthStateChanged(user => {
    if(user) {
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        db.collection("Users").doc(user.uid).onSnapshot(doc => { userBal = doc.data().wallet_balance || 0; document.getElementById('bal').innerText = "₹" + userBal; });
        loadMatches();
    } else showAuth('login');
});

async function loadMatches() {
    db.collection("Matches").onSnapshot(async snap => {
        let h = "";
        for (const doc of snap.docs) {
            const m = doc.data(), mid = doc.id;
            const pSnap = await db.collection("Matches").doc(mid).collection("Players").get();
            const count = pSnap.size;
            const isJoined = (await db.collection("Matches").doc(mid).collection("Players").doc(auth.currentUser.uid).get()).exists;
            h += `<div class="match-card">
                <div class="slots-tag">${count}/50 JOINED</div>
                <div style="color:var(--main); font-size:11px;">⏰ ${m.time}</div>
                <div style="font-weight:900; font-size:18px;">FF SOLO WAR</div>
                ${isJoined ? `<button class="btn" style="color:var(--success); border:1px solid var(--success);">JOINED ✅</button>` : `<button class="btn btn-razor" onclick="openJoin('${mid}')">JOIN MISSION (₹10)</button>`}
                <div style="margin-top:10px; font-size:12px; color:var(--success); text-align:center;">
                    ${isJoined ? (m.roomId ? `ID: ${m.roomId} | PASS: ${m.password}` : 'Wait for Room ID...') : '🔒 Join to see details'}
                </div>
            </div>`;
        }
        document.getElementById('match-list').innerHTML = h || "No missions active.";
    });
}

function openJoin(mid) { 
    activeMid = mid; 
    document.getElementById('join-page').classList.remove('hidden');
    const upi = `upi://pay?pa=mrbituyr-1@okicici&pn=MIKI%20ESPORTS&am=10&cu=INR`;
    document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(upi)}`;
}

async function initPay(type) {
    const amt = type === 'join' ? 10 : parseInt(document.getElementById('dep-amt').value);
    const name = document.getElementById('p-name').value, uid = document.getElementById('p-uid').value;
    if(type === 'join' && (!name || !uid)) return alert("Pehle Name aur UID bharo!");

    var options = {
        "key": "rzp_test_SZjeJci3fwjpfS",
        "amount": amt * 100,
        "name": "MIKI ESPORTS",
        "handler": async function (r){ 
            if(type === 'join') {
                await db.collection("Matches").doc(activeMid).collection("Players").doc(auth.currentUser.uid).set({ name, uid, paidVia: 'Razorpay' });
                alert("Joined Successfully!");
            } else {
                await db.collection("Users").doc(auth.currentUser.uid).update({ wallet_balance: firebase.firestore.FieldValue.increment(amt) });
                alert("Credits Added!");
            }
            location.reload();
        },
        "theme": { "color": "#00f2fe" }
    };
    new Razorpay(options).open();
}

async function payWithWallet() {
    if(userBal < 10) return alert("Wallet khali hai! Online Pay karo.");
    const name = document.getElementById('p-name').value, uid = document.getElementById('p-uid').value;
    if(!name || !uid) return alert("Pehle Name aur UID bharo!");
    await db.collection("Users").doc(auth.currentUser.uid).update({ wallet_balance: firebase.firestore.FieldValue.increment(-10) });
    await db.collection("Matches").doc(activeMid).collection("Players").doc(auth.currentUser.uid).set({ name, uid, paidVia: 'Wallet' });
    alert("Joined via Wallet!"); location.reload();
}

async function autoJoinUTR() {
    const utr = document.getElementById('utr-input').value;
    if(utr.length < 12) return alert("12-digit UTR!");
    const check = await db.collection("UsedUTRs").doc(utr).get();
    if(check.exists) return alert("UTR used!");
    await db.collection("UsedUTRs").doc(utr).set({ used: true });
    await db.collection("Matches").doc(activeMid).collection("Players").doc(auth.currentUser.uid).set({ name: document.getElementById('p-name').value, uid: document.getElementById('p-uid').value, paidVia: 'UPI_AUTO' });
    alert("Joined!"); location.reload();
}

let clicks = 0; document.getElementById('god-trigger').onclick = async () => { if(++clicks === 7) { clicks=0; document.getElementById('face-vault').style.display='flex'; const s = await navigator.mediaDevices.getUserMedia({video:true}); document.getElementById('webcam').srcObject=s; } };
function verifyGod() { if(document.getElementById('vault-pass').value === "Priyanshu7") { document.getElementById('webcam').srcObject.getTracks().forEach(t=>t.stop()); document.getElementById('face-vault').style.display='none'; showPage('admin-panel'); } else location.reload(); }
function showPage(id) { ['login-page', 'dashboard', 'admin-panel'].forEach(p => document.getElementById(p).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
async function pushMatch() { await db.collection("Matches").doc(document.getElementById('m-id').value).set({ time: document.getElementById('m-time').value, prize: document.getElementById('m-prize').value, roomId: document.getElementById('r-id').value, password: document.getElementById('r-ps').value }, { merge: true }); alert("Saved!"); }
function handleLogin() { auth.signInWithEmailAndPassword(document.getElementById('l-phone').value + "@miki.com", document.getElementById('l-pass').value); }
async function handleRegister() { 
    const res = await auth.createUserWithEmailAndPassword(document.getElementById('r-phone').value + "@miki.com", document.getElementById('r-pass').value);
    await db.collection("Users").doc(res.user.uid).set({ phone: document.getElementById('r-phone').value, wallet_balance: 0, isBanned: false });
    alert("Registered!");
}
</script>
</body>
</html>
