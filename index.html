<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIKI ESPORTS | PRO TERMINAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

    <style>
        :root { --main: #00ff88; --bg: #050505; --card: rgba(17, 17, 17, 0.9); --red: #ff4444; }
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; user-select: none; }
        .header { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 100; }
        .hacker-logo { width: 45px; cursor: pointer; filter: drop-shadow(0 0 5px var(--main)); }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid var(--main); color: var(--main); border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--main); color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
        .wallet-box { display: flex; justify-content: space-between; align-items: center; background: rgba(0,255,136,0.1); padding: 15px; border-radius: 10px; border: 1px dashed var(--main); }
        .match-card { background: #111; padding: 15px; border-radius: 10px; border-left: 4px solid var(--main); margin-top: 10px; }
        
        /* Admin Table Style */
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background: #222; color: var(--main); }
        .status-paid { color: var(--main); font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://cdn-icons-png.flaticon.com/512/940/940544.png" class="hacker-logo" id="admin-trigger">
    <div style="font-size:14px; font-weight:bold; color:var(--main);">MIKI ESPORTS</div>
</div>

<div class="container">
    <div id="auth-section" class="card">
        <h3 id="auth-title" style="text-align:center; color:var(--main);">ACCESS KEY</h3>
        <input type="number" id="u-phone" placeholder="Mobile Number">
        <input type="password" id="u-pass" placeholder="Password">
        <button class="btn" onclick="handleAuth()">LOGIN / REGISTER</button>
        <p style="text-align:center; font-size:12px; color:#aaa; cursor:pointer;" onclick="toggleMode()" id="mode-text">New Player? Register Here</p>
    </div>

    <div id="dashboard" class="hidden">
        <div class="wallet-box">
            <div><small>WALLET_BALANCE</small><div id="bal" style="font-size:22px; font-weight:bold; color:var(--main);">₹0</div></div>
            <button onclick="alert('Contact Admin to Deposit')" style="background:none; border:1px solid var(--main); color:var(--main); padding:5px 10px; border-radius:4px; font-size:10px;">ADD CASH</button>
        </div>
        <h4 style="margin:20px 0 10px 0; color:var(--main);">ACTIVE MISSIONS</h4>
        <div id="match-list"></div>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="card" style="border-color: var(--red);">
            <h3 style="color:var(--red); text-align:center; margin-top:0;">MASTER CONTROL</h3>
            
            <input type="text" id="m-id" placeholder="Match ID (e.g. M1)">
            <input type="text" id="r-id" placeholder="Room ID">
            <input type="text" id="r-ps" placeholder="Room Password">
            <button class="btn" style="background:var(--red); color:#fff;" onclick="updateRoom()">SEND ROOM ID</button>
            
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            
            <input type="text" id="t-uid" placeholder="User UID (Get from Users collection)">
            <input type="number" id="a-amt" placeholder="Amount (e.g. 100)">
            <button class="btn" onclick="addCash()">DEPOSIT CASH</button>

            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">

            <h4 style="color:var(--main);">LIVE PARTICIPANTS</h4>
            <input type="text" id="v-mid" placeholder="Enter Match ID to View (e.g. M1)">
            <button class="btn" style="background:#444; color:#fff;" onclick="viewPlayers()">VIEW PLAYERS</button>
            
            <div id="players-table-area" class="hidden">
                <table id="p-table">
                    <thead>
                        <tr><th>Name</th><th>UID</th><th>Level</th><th>Pay</th></tr>
                    </thead>
                    <tbody id="p-list"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDiVgQ-FMis2N77nHu6dTY17aTPpmBrNL4",
    authDomain: "miki-turnament-93d48.firebaseapp.com",
    projectId: "miki-turnament-93d48",
    storageBucket: "miki-turnament-93d48.firebasestorage.app",
    messagingSenderId: "832870643730",
    appId: "1:832870643730:web:ff17abcb9652a4acd2c0cb"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let isLogin = true;
function toggleMode() {
    isLogin = !isLogin;
    document.getElementById('auth-title').innerText = isLogin ? "ACCESS KEY" : "CREATE ACCOUNT";
    document.getElementById('mode-text').innerText = isLogin ? "New Player? Register Here" : "Back to Login";
}

function handleAuth() {
    const ph = document.getElementById('u-phone').value;
    const ps = document.getElementById('u-pass').value;
    if(ph.length < 10 || ps.length < 6) return alert("Bhai, Number aur Password sahi dalo!");
    const email = ph + "@miki.com";

    if(isLogin) {
        auth.signInWithEmailAndPassword(email, ps).then(r => startApp(r.user)).catch(e => alert("Login Fail: " + e.message));
    } else {
        auth.createUserWithEmailAndPassword(email, ps).then(r => { alert("Account Ready! Now Login."); toggleMode(); }).catch(e => alert("Error: " + e.message));
    }
}

async function startApp(user) {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');

    const uRef = db.collection("Users").doc(user.uid);
    const snap = await uRef.get();
    if(!snap.exists) await uRef.set({ phone: user.email.split('@')[0], wallet_balance: 0, uid: user.uid });

    uRef.onSnapshot(doc => {
        if(doc.exists) document.getElementById('bal').innerText = "₹" + (doc.data().wallet_balance || 0);
    });
    loadMatches();
}

function loadMatches() {
    db.collection("Matches").onSnapshot(snap => {
        let h = "";
        snap.forEach(d => {
            const m = d.data();
            h += `<div class="match-card">
                <b style="color:var(--main);">${m.title}</b><br>
                <small style="color:#888;">Entry: ₹${m.entryFee} | Prize: ${m.prize}</small><br>
                <button class="btn" style="padding:5px; font-size:11px;" onclick="joinMatch('${d.id}', ${m.entryFee})">JOIN MATCH</button>
                ${m.roomId ? `<div style="background:#222; padding:5px; margin-top:5px; color:yellow; font-size:10px;">ID: ${m.roomId} | PASS: ${m.password}</div>` : ''}
            </div>`;
        });
        document.getElementById('match-list').innerHTML = h || "No matches yet.";
    });
}

async function joinMatch(mid, fee) {
    const user = auth.currentUser;
    const uRef = db.collection("Users").doc(user.uid);
    const snap = await uRef.get();
    const currentBal = snap.data().wallet_balance;

    if(currentBal >= fee) {
        const name = prompt("Free Fire Name:");
        const uid = prompt("Free Fire UID:");
        const level = prompt("Game Level:");
        if(!name || !uid) return alert("Details bharna zaroori hai!");

        await uRef.update({ wallet_balance: currentBal - fee });
        // Saving player data in a sub-collection
        await db.collection("Matches").doc(mid).collection("Players").doc(user.uid).set({
            playerName: name,
            playerUid: uid,
            playerLevel: level,
            payment: "PAID",
            time: new Date().toLocaleString()
        });
        alert("✅ Success! Joined Match.");
    } else { alert("Insufficient Balance!"); }
}

// ADMIN FUNCTIONS
let secret = 0;
document.getElementById('admin-trigger').onclick = () => {
    secret++;
    if(secret === 7) {
        if(prompt("Admin Key:") === "Priyanshu7") {
            document.getElementById('admin-panel').classList.remove('hidden');
        }
        secret = 0;
    }
};

async function viewPlayers() {
    const mid = document.getElementById('v-mid').value;
    if(!mid) return alert("Match ID dalo bhai!");
    
    db.collection("Matches").doc(mid).collection("Players").onSnapshot(snap => {
        let h = "";
        snap.forEach(p => {
            const d = p.data();
            h += `<tr>
                <td>${d.playerName}</td>
                <td>${d.playerUid}</td>
                <td>${d.playerLevel}</td>
                <td class="status-paid">${d.payment}</td>
            </tr>`;
        });
        document.getElementById('p-list').innerHTML = h;
        document.getElementById('players-table-area').classList.remove('hidden');
    });
}

async function updateRoom() {
    const mid = document.getElementById('m-id').value;
    const rid = document.getElementById('r-id').value;
    const rps = document.getElementById('r-ps').value;
    await db.collection("Matches").doc(mid).update({ roomId: rid, password: rps });
    alert("Room Details Pushed!");
}

async function addCash() {
    const uid = document.getElementById('t-uid').value;
    const amt = parseInt(document.getElementById('a-amt').value);
    await db.collection("Users").doc(uid).update({ wallet_balance: firebase.firestore.FieldValue.increment(amt) });
    alert("Cash Added!");
}
</script>
</body>
</html>
