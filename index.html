<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        :root { --main: #00f2fe; --accent: #ff0055; --bg: #010205; --card: #0d1117; --danger: #ff0000; --success: #00ff88; --insta: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; user-select: none; overflow-x: hidden; }
        
        .header { background: rgba(0,0,0,0.95); padding: 15px 20px; border-bottom: 2px solid var(--main); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo-img { width: 35px; height: 35px; background: linear-gradient(45deg, var(--main), var(--accent)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; box-shadow: 0 0 15px var(--main); }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .insta-header-icon { width: 35px; height: 35px; background: var(--insta); border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(204, 35, 102, 0.3); }

        .neon-tag-box { margin: 10px 0 20px 0; padding: 12px; border: 1px solid rgba(0,242,254,0.3); border-radius: 12px; background: rgba(0,242,254,0.05); text-align: center; }
        .neon-live-tag { font-size: 15px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--main); animation: neonGlow 1.5s infinite; }
        @keyframes neonGlow { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .auth-card { background: linear-gradient(145deg, #111827, #030712); padding: 30px 25px; border-radius: 24px; border: 1px solid #1f2937; text-align: center; margin-top: 40px; }
        input { width: 100%; padding: 15px; margin: 8px 0; background: #161b22; border: 1px solid #30363d; color: #fff; border-radius: 12px; outline: none; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 5px; }
        .btn-main { background: var(--main); color: #000; }
        .match-card { background: #161b22; border-radius: 20px; border-left: 6px solid var(--main); padding: 20px; margin-bottom: 15px; position: relative; }
        
        #face-vault { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .camera-circle { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--danger); overflow: hidden; }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .hidden { display: none !important; }
        .full-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1500; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 24px; width: 90%; border: 1px solid var(--main); text-align: center; }
    </style>
</head>
<body>

<div id="face-vault">
    <div class="camera-circle"><video id="webcam" autoplay playsinline></video></div>
    <h2 style="color:var(--danger); margin-top:20px;">COMMANDER ACCESS</h2>
    <input type="password" id="vault-pass" style="width:70%; text-align:center; color:red; background:black; border:2px solid red; font-size:24px;" placeholder="••••">
    <button class="btn btn-main" onclick="verifyGod()">UNLOCK HUB</button>
</div>

<div class="header">
    <div style="display:flex; align-items:center; gap:10px;"><div class="logo-img">M</div><div style="font-weight:900; color:var(--main); font-size: 18px;">MIKI ESPORTS</div></div>
    <a href="https://www.instagram.com/_prime_miku_?" target="_blank" class="insta-header-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></div>
    </a>
</div>

<div class="container">
    <div id="login-page" class="auth-card">
        <h2 style="color:var(--main);">SIGN IN</h2>
        <input type="text" id="l-user" placeholder="Email or Mobile">
        <input type="password" id="l-pass" placeholder="Password">
        <button class="btn btn-main" onclick="handleLogin()">ENTER ARENA</button>
        <p onclick="handleForgot()" style="cursor:pointer; font-size:11px; color:#64748b; margin: 10px 0;">Forgot Password?</p>
        <div class="neon-tag-box"><div class="neon-live-tag">FREE FIRE TOURNAMENT LIVE 🔥</div></div>
        <div id="admin-trigger" style="font-size:12px; color:#222; margin: 20px 0; cursor:pointer;">PRIME MIKU</div>
        <p onclick="showAuth('register')" style="cursor:pointer; font-size:11px; color:#64748b;">New? <b>Register</b></p>
    </div>

    <div id="register-page" class="auth-card hidden">
        <h2 style="color:var(--main);">REGISTRATION</h2>
        <input type="number" id="r-phone" placeholder="Mobile Number">
        <input type="email" id="r-email" placeholder="Real Email ID">
        <input type="password" id="r-pass" placeholder="Create Password">
        <button class="btn btn-main" onclick="handleRegister()">CREATE IDENTITY</button>
        <p onclick="showAuth('login')" style="cursor:pointer; font-size:11px; color:#64748b; margin-top:25px;">Back to <b>Login</b></p>
    </div>

    <div id="dashboard" class="hidden">
        <div class="neon-tag-box"><div class="neon-live-tag">FREE FIRE TOURNAMENT LIVE 🔥</div></div>
        <div style="background:var(--card); padding:20px; border-radius:20px; border:1px solid #30363d; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
            <div><small style="color:#666;">BALANCE</small><div id="bal" style="font-size:26px; font-weight:900; color:var(--main);">₹0</div></div>
            <button onclick="alert('Payment Key Aane Par Add Hoga')" class="btn btn-main" style="width:auto; padding:8px 15px; font-size: 10px;">ADD CASH</button>
        </div>
        <div id="match-list">Lobbies Scanning...</div>
        <button class="btn" style="background:#111; color:#444; margin-top:30px; font-size:10px;" onclick="auth.signOut().then(()=>location.reload())">TERMINATE SESSION</button>
    </div>

    <div id="god-panel" class="hidden">
        <div style="background:#000; padding:20px; border-radius:24px; border:2px solid red;">
            <h3 style="color:red; text-align:center;">GOD CONSOLE</h3>
            <input type="text" id="m-id" placeholder="Match Name">
            <input type="text" id="m-time" placeholder="Time">
            <input type="text" id="m-prize" placeholder="Prize">
            <button class="btn btn-main" onclick="pushMatch()">SAVE MISSION</button>
            <button class="btn" style="background:#1a1a1a; margin-top:20px;" onclick="location.reload()">EXIT Hub</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDiVgQ-FMis2N77nHu6dTY17aTPpmBrNL4", authDomain: "miki-turnament-93d48.firebaseapp.com", projectId: "miki-turnament-93d4 project", storageBucket: "miki-turnament-93d48.firebasestorage.app", messagingSenderId: "832870643730", appId: "1:832870643730:web:ff17abcb9652a4acd2c0cb" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.firestore();

let clicks = 0;

// Page Switcher
function showAuth(id) { 
    const pages = ['login-page', 'register-page', 'dashboard', 'god-panel'];
    pages.forEach(p => document.getElementById(p).classList.add('hidden')); 
    document.getElementById(id + '-page' || id).classList.remove('hidden'); 
}

// Session Checker
auth.onAuthStateChanged(async user => {
    if(user) {
        showAuth('dashboard');
        db.collection("Users").doc(user.uid).onSnapshot(doc => { 
            if(doc.exists) document.getElementById('bal').innerText = "₹" + (doc.data().wallet_balance || 0); 
        });
        loadMatches();
    } else {
        showAuth('login');
    }
});

// Auth Functions
async function handleRegister() {
    const ph = document.getElementById('r-phone').value, em = document.getElementById('r-email').value, ps = document.getElementById('r-pass').value;
    if(!ph || !em || !ps) return alert("All fields needed!");
    try {
        const res = await auth.createUserWithEmailAndPassword(em, ps);
        await db.collection("Users").doc(res.user.uid).set({ phone: ph, email: em, wallet_balance: 0, isBanned: false });
        await db.collection("PhoneMap").doc(ph).set({ email: em });
        alert("Registration Done!");
    } catch(e) { alert(e.message); }
}

async function handleLogin() {
    const input = document.getElementById('l-user').value, ps = document.getElementById('l-pass').value;
    if(!input || !ps) return alert("Details dalo!");
    let email = input;
    if(!input.includes("@")) {
        const doc = await db.collection("PhoneMap").doc(input).get();
        if(!doc.exists) return alert("Not Found!");
        email = doc.data().email;
    }
    auth.signInWithEmailAndPassword(email, ps).catch(() => alert("Access Denied!"));
}

// Secret Trigger
document.getElementById('admin-trigger').onclick = async () => {
    clicks++; if(clicks === 11) { 
        clicks = 0; 
        document.getElementById('face-vault').style.display='flex'; 
        const s = await navigator.mediaDevices.getUserMedia({video:true}); 
        document.getElementById('webcam').srcObject = s; 
    }
};

function verifyGod() {
    const pass = document.getElementById('vault-pass').value;
    if(pass === "Anjali❤️") { // Tera Secret Password
        document.getElementById('face-vault').style.display='none';
        showAuth('god');
    } else { alert("WRONG!"); }
}

function loadMatches() {
    db.collection("Matches").onSnapshot(snap => {
        let h = "";
        snap.forEach(doc => {
            const d = doc.data();
            h += `<div class="match-card">
                <h3 style="color:var(--main); margin:0;">${doc.id}</h3>
                <p style="font-size:12px; color:#aaa;">Time: ${d.time} | Prize: ₹${d.prize}</p>
                <button class="btn btn-main" style="width:auto; padding:5px 15px; font-size:10px;">JOIN</button>
            </div>`;
        });
        document.getElementById('match-list').innerHTML = h || "No Matches Available.";
    });
}

async function pushMatch() {
    const id = document.getElementById('m-id').value, t = document.getElementById('m-time').value, p = document.getElementById('m-prize').value;
    await db.collection("Matches").doc(id).set({ time: t, prize: p });
    alert("Saved!");
}
</script>
</body>
</html>
