<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIKI ESPORTS | FACE SCANNER</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        :root { --main: #00f2fe; --accent: #ff0055; --bg: #010306; --card: #0b1120; --danger: #ff0000; --success: #0f8; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; user-select: none; overflow-x: hidden; }
        
        /* Header */
        .header { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); padding: 12px 20px; border-bottom: 2px solid var(--main); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo-img { width: 35px; height: 35px; background: linear-gradient(45deg, var(--main), var(--accent)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; box-shadow: 0 0 15px var(--main); }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #1f2937; margin-bottom: 15px; }

        /* --- LIVE FACE SCANNER UI --- */
        #face-vault { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        
        .camera-container { position: relative; width: 220px; height: 220px; border-radius: 50%; border: 4px solid var(--danger); overflow: hidden; box-shadow: 0 0 30px rgba(255,0,0,0.5); margin-bottom: 20px; }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Scanning Line Animation */
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--danger); top: 0; left: 0; box-shadow: 0 0 15px red; animation: scan 2s infinite linear; z-index: 10; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .vault-h2 { color: var(--danger); letter-spacing: 2px; text-transform: uppercase; font-weight: 900; margin: 10px 0; font-size: 18px; text-shadow: 0 0 10px red; }
        .vault-input { background: rgba(0,0,0,0.6) !important; border: 2px solid var(--danger) !important; color: #ff4444 !important; text-align: center; font-size: 24px !important; letter-spacing: 6px !important; width: 80% !important; border-radius: 12px; padding: 15px !important; outline: none; margin-top: 10px; }

        /* General Buttons */
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-main { background: linear-gradient(45deg, var(--main), #3b82f6); color: #000; }
        .btn-logout { background: transparent; border: 1px solid #333; color: #666; margin-top: 20px; font-size: 11px; }

        .hidden { display: none !important; }
        .full-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1500; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 20px; width: 85%; border: 1px solid var(--main); text-align: center; }
    </style>
</head>
<body>

<div id="face-vault">
    <div class="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div class="scan-line"></div>
    </div>
    <h2 class="vault-h2">FACE DETECTED</h2>
    <p style="font-size:10px; color:#555;">VERIFYING MASTER IDENTITY...</p>
    <input type="password" id="vault-pass" class="vault-input" placeholder="••••">
    <button class="btn btn-main" style="width:80%; margin-top:25px;" onclick="checkVault()">VERIFY PASSWORD</button>
    <button class="btn-logout" style="border:none;" onclick="hideVault()">CANCEL SCAN</button>
</div>

<div class="header">
    <div style="display:flex; align-items:center; gap:10px;">
        <div class="logo-img">M</div>
        <div style="font-weight:900; color:var(--main);">MIKI ESPORTS</div>
    </div>
    <div style="display:flex; gap:15px; align-items:center;">
        <a href="https://www.instagram.com/_prime_miku_?igsh=Y296bXdpZGl5dzFs" target="_blank" style="text-decoration:none; font-size:20px;">📸</a>
        <div id="admin-trigger" style="font-size:24px; cursor:pointer; filter:brightness(0.5);">🏆</div>
    </div>
</div>

<div class="container">
    <div id="auth-section" class="card hidden" style="text-align:center;">
        <h3>WARRIOR LOGIN</h3>
        <input type="number" id="u-phone" placeholder="Mobile Number">
        <input type="password" id="u-pass" placeholder="Password">
        <button class="btn btn-main" onclick="handleAuth()">ENTER ARENA</button>
    </div>

    <div id="dashboard" class="hidden">
        <div class="card" style="background: linear-gradient(145deg, #1e1b4b, #0f172a); border: 1px solid var(--gold);">
            <div style="color:var(--gold); font-weight:bold; font-size:14px; display:flex; justify-content:space-between;"><span>🎁 REWARD MISSION</span><span>₹29</span></div>
            <div style="background:rgba(0,0,0,0.5); height:10px; border-radius:5px; margin:15px 0; overflow:hidden;"><div id="reward-progress" style="height:100%; background:var(--gold); width:0%; transition:1s;"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:10px; color:#94a3b8;"><span id="match-count-txt">Played: 0/20</span><span>Get Code</span></div>
        </div>

        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <div><small style="color:#64748b;">WALLET</small><div id="bal" style="font-size:26px; font-weight:900; color:var(--main);">₹0</div></div>
            <button onclick="document.getElementById('deposit-page').classList.remove('hidden')" class="btn btn-main" style="width:auto; padding:8px 15px; margin:0;">+ ADD</button>
        </div>
        
        <h4>ACTIVE MISSIONS</h4>
        <div id="match-list">Loading...</div>
        <button class="btn btn-logout" onclick="logoutPlayer()">🚪 TERMINATE SESSION</button>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="card" style="border-color: var(--danger); background: #000;">
            <h3 style="color:var(--danger);">MASTER CONSOLE</h3>
            <input type="text" id="m-id" placeholder="Match ID">
            <input type="text" id="m-time" placeholder="Time">
            <input type="text" id="r-id" placeholder="Room ID">
            <input type="text" id="r-ps" placeholder="Room Pass">
            <button class="btn btn-main" onclick="updateRoom()">PUSH UPDATE</button>
            <input type="text" id="t-uid" placeholder="Phone" style="margin-top:20px;">
            <input type="number" id="a-amt" placeholder="Amount">
            <button class="btn btn-main" onclick="addCash()">ADD CASH</button>
            <button class="btn" style="background:#111; color:#555; margin-top:10px;" onclick="location.reload()">EXIT</button>
        </div>
    </div>
</div>

<div id="deposit-page" class="full-overlay hidden"><div class="modal-box"><h3>RECHARGE</h3><input type="number" id="dep-amt" placeholder="Min ₹40"><button class="btn btn-main" onclick="processDeposit()">PAY</button><button class="btn-logout" style="border:none;" onclick="document.getElementById('deposit-page').classList.add('hidden')">CANCEL</button></div></div>
<div id="join-page" class="full-overlay hidden"><div class="modal-box"><h3>JOIN MATCH</h3><input type="text" id="p-name" placeholder="Name"><input type="text" id="p-uid" placeholder="UID"><button class="btn btn-main" onclick="submitJoinRequest()">JOIN ₹10</button><button class="btn-logout" style="border:none;" onclick="document.getElementById('join-page').classList.add('hidden')">CANCEL</button></div></div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = { apiKey: "AIzaSyDiVgQ-FMis2N77nHu6dTY17aTPpmBrNL4", authDomain: "miki-turnament-93d48.firebaseapp.com", projectId: "miki-turnament-93d48", storageBucket: "miki-turnament-93d48.firebasestorage.app", messagingSenderId: "832870643730", appId: "1:832870643730:web:ff17abcb9652a4acd2c0cb" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- SCARY VOICE ---
function speak(t, p) {
    const s = new SpeechSynthesisUtterance(t);
    s.pitch = p || 0.1; s.rate = 0.8; s.volume = 1;
    window.speechSynthesis.speak(s);
}

// --- FACE SCANNER SYSTEM ---
let videoStream = null;
let clicks = 0;
document.getElementById('admin-trigger').onclick = () => {
    clicks++;
    if(clicks === 7) { 
        clicks = 0; 
        startFaceScan();
    }
};

async function startFaceScan() {
    const vault = document.getElementById('face-vault');
    const video = document.getElementById('webcam');
    
    try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = videoStream;
        vault.style.display = 'flex';
        speak("Face detected. Accessing master core. Enter password.");
    } catch (err) {
        alert("Camera Access Required for Admin!");
    }
}

function hideVault() {
    if(videoStream) videoStream.getTracks().forEach(track => track.stop());
    document.getElementById('face-vault').style.display = 'none';
    document.getElementById('vault-pass').value = "";
}

function checkVault() {
    const p = document.getElementById('vault-pass').value;
    if(p === "Priyanshu7") {
        speak("Welcome back Priyanshu, site is under your control.", 0.1);
        setTimeout(() => {
            hideVault();
            document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
        }, 2000);
    } else {
        speak("Access Denied. Identity Theft Detected.", 0.5);
        alert("☠️ WRONG PASSWORD!");
        hideVault();
    }
}

// --- CORE LOGIC ---
auth.onAuthStateChanged(user => { if(user) startApp(user); else document.getElementById('auth-section').classList.remove('hidden'); });

async function startApp(user) {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    const uRef = db.collection("Users").doc(user.uid);
    const snap = await uRef.get();
    if(!snap.exists) await uRef.set({ phone: user.email.split('@')[0], wallet_balance: 0, match_played: 0 });
    uRef.onSnapshot(doc => { 
        const d = doc.data(); if(!d) return;
        document.getElementById('bal').innerText = "₹" + (d.wallet_balance || 0);
        document.getElementById('reward-progress').style.width = (d.match_played/20)*100 + "%";
        document.getElementById('match-count-txt').innerText = `Played: ${d.match_played || 0}/20`;
    });
    loadMatches();
}

async function loadMatches() {
    db.collection("Matches").onSnapshot(snap => {
        let h = "";
        snap.forEach(d => {
            const m = d.data(), mid = d.id;
            h += `<div class="match-card">
                <div style="font-size:10px; color:var(--main); margin-bottom:5px;">⏰ ${m.time || 'TBA'}</div>
                <div style="font-weight:900; font-size:18px;">${m.title || 'SOLO MATCH'}</div>
                <div style="font-size:12px; color:#666;">FEE: ₹10 | PRIZE: ${m.prize || '₹50'}</div>
                <button class="btn btn-main" style="margin-top:10px;" onclick="openJoin('${mid}')">JOIN MISSION</button>
                <div class="room-info">${m.roomId ? `ID: ${m.roomId} | PASS: ${m.password}` : '🔒 Join to see Room'}</div>
            </div>`;
        });
        document.getElementById('match-list').innerHTML = h || "No Active Missions.";
    });
}

function openJoin(mid) { activeMid = mid; document.getElementById('join-page').classList.remove('hidden'); }
async function submitJoinRequest() {
    const uRef = db.collection("Users").doc(auth.currentUser.uid);
    await uRef.update({ wallet_balance: firebase.firestore.FieldValue.increment(-10), match_played: firebase.firestore.FieldValue.increment(1) });
    await db.collection("Matches").doc(activeMid).collection("Players").doc(auth.currentUser.uid).set({ players: [{playerName: document.getElementById('p-name').value, playerUid: document.getElementById('p-uid').value}] });
    document.getElementById('join-page').classList.add('hidden');
    alert("Joined!");
}

async function processDeposit() {
    const amt = parseInt(document.getElementById('dep-amt').value);
    if(amt < 40) return alert("Min ₹40!");
    await db.collection("Users").doc(auth.currentUser.uid).update({ wallet_balance: firebase.firestore.FieldValue.increment(amt) });
    alert("Done!"); document.getElementById('deposit-page').classList.add('hidden');
}

function handleAuth() { auth.signInWithEmailAndPassword(document.getElementById('u-phone').value + "@miki.com", document.getElementById('u-pass').value).catch(e => { auth.createUserWithEmailAndPassword(document.getElementById('u-phone').value + "@miki.com", document.getElementById('u-pass').value); }); }
function logoutPlayer() { auth.signOut().then(() => location.reload()); }
async function addCash() { const q = await db.collection("Users").where("phone", "==", document.getElementById('t-uid').value).get(); if(!q.empty) await q.docs[0].ref.update({ wallet_balance: firebase.firestore.FieldValue.increment(parseInt(document.getElementById('a-amt').value)) }); }
async function updateRoom() { await db.collection("Matches").doc(document.getElementById('m-id').value).set({ time: document.getElementById('m-time').value, roomId: document.getElementById('r-id').value, password: document.getElementById('r-ps').value }, { merge: true }); alert("Updated!"); }
</script>
</body>
</html>
