<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIKI ESPORTS | PRO TERMINAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        :root { --main: #00f2fe; --accent: #ff0055; --bg: #0a0e17; --card: #161b29; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; margin: 0; user-select: none; }
        .header { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--main); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: linear-gradient(45deg, var(--main), #4facfe); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .hidden { display: none !important; }

        /* --- Secure Face Scan Overlay --- */
        #face-scan-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #camera-view { width: 220px; height: 220px; border-radius: 50%; border: 3px solid var(--main); object-fit: cover; box-shadow: 0 0 20px var(--main); }
        .scan-timer { color: var(--main); font-size: 18px; margin-bottom: 15px; font-family: monospace; }
        .denied-blink { color: #ff4444; font-size: 24px; font-weight: bold; margin-top: 20px; animation: blink 0.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- Match Cards --- */
        .match-card { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; border-left: 4px solid var(--main); }
        .time-badge { background: rgba(0,242,254,0.1); color: var(--main); padding: 4px 8px; border-radius: 4px; font-size: 11px; margin-bottom: 10px; display: inline-block; }
        .room-info { background: rgba(255,202,40,0.1); border: 1px dashed #ffca28; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; color: #ffca28; font-size: 12px; }
        
        .player-list { margin-top: 15px; border-top: 1px solid #222; padding-top: 10px; }
        .p-item { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0; color: #aaa; }

        /* Rules Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 15px; width: 80%; border: 1px solid var(--main); text-align: center; }
    </style>
</head>
<body>

<div id="face-scan-overlay" class="hidden">
    <div class="scan-timer" id="timer-txt">SCANNING: 5s</div>
    <video id="camera-view" autoplay playsinline></video>
    <div id="denied-msg" class="hidden denied-blink">ACCESS DENIED ❌</div>
</div>

<div id="rules-modal" class="modal hidden">
    <div class="modal-box">
        <h3 style="color:var(--main);">🛡️ MATCH RULES</h3>
        <p style="font-size:12px; color:#ccc;">1. No Cheating/Hacking.<br>2. ID/Pass will appear 10m before start.<br>3. Don't share Room Password.</p>
        <button class="btn" onclick="closeRules()">I AGREE</button>
    </div>
</div>

<div class="header">
    <div style="width:30px;"></div>
    <div style="font-weight:900; color:var(--main);">MIKI ESPORTS</div>
    <div id="admin-trigger" style="font-size:24px; cursor:pointer;">🏆</div>
</div>

<div class="container">
    <div id="auth-section" class="card" style="text-align: center;">
        <h3 id="auth-title">PLAYER LOGIN</h3>
        <input type="number" id="u-phone" placeholder="Wallet ID (Mobile)">
        <input type="password" id="u-pass" placeholder="Password">
        <button class="btn" onclick="handleAuth()">ENTER ARENA</button>
        <p style="font-size:12px; color:#aaa; cursor:pointer;" onclick="toggleMode()">New Player? Create Account</p>
    </div>

    <div id="dashboard" class="hidden">
        <div class="card" style="display:flex; justify-content:space-between; align-items:center; border:1px solid var(--main);">
            <div><small>WALLET</small><div id="bal" style="font-size:24px; font-weight:bold; color:var(--main);">₹0</div></div>
            <button onclick="openPaymentGateway()" class="btn" style="width:auto; padding:8px 15px; margin:0;">ADD CASH</button>
        </div>
        <h4>LIVE TOURNAMENTS</h4>
        <div id="match-list">Loading missions...</div>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="card" style="border-color: var(--accent);">
            <h3 style="color:var(--accent);">ADMIN PANEL</h3>
            <input type="text" id="m-id" placeholder="Match ID (e.g. M1)">
            <input type="text" id="m-time" placeholder="Time (e.g. 10:30 PM)">
            <input type="text" id="r-id" placeholder="Room ID">
            <input type="text" id="r-ps" placeholder="Room Password">
            <button class="btn" onclick="updateRoom()">UPDATE MATCH DATA</button>
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            <input type="text" id="t-uid" placeholder="Phone Number">
            <input type="number" id="a-amt" placeholder="Amount (₹)">
            <button class="btn" onclick="addCash()">DIRECT RECHARGE</button>
        </div>
    </div>
</div>

<script>
// --- CONFIGURATION ---
const firebaseConfig = {
    apiKey: "AIzaSyDiVgQ-FMis2N77nHu6dTY17aTPpmBrNL4",
    authDomain: "miki-turnament-93d48.firebaseapp.com",
    projectId: "miki-turnament-93d48",
    storageBucket: "miki-turnament-93d48.firebasestorage.app",
    messagingSenderId: "832870643730",
    appId: "1:832870643730:web:ff17abcb9652a4acd2c0cb"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- SECURE ADMIN LOGIN ---
let clicks = 0;
document.getElementById('admin-trigger').onclick = () => {
    clicks++;
    if(clicks === 7) { clicks=0; runSecurityScan(); }
};

async function runSecurityScan() {
    const overlay = document.getElementById('face-scan-overlay');
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    overlay.classList.remove('hidden');
    document.getElementById('camera-view').srcObject = stream;
    
    let time = 5;
    const itv = setInterval(() => {
        time--;
        document.getElementById('timer-txt').innerText = `SCANNING: ${time}s`;
        if(time <= 0) {
            clearInterval(itv);
            document.getElementById('denied-msg').classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.add('hidden');
                document.getElementById('denied-msg').classList.add('hidden');
                stream.getTracks().forEach(t => t.stop());
                if(confirm("ONLY admin login please enter password")) {
                    if(prompt("Master Password:") === "Priyanshu7") {
                        document.getElementById('admin-panel').classList.remove('hidden');
                        document.getElementById('dashboard').classList.add('hidden');
                    }
                }
            }, 2000);
        }
    }, 1000);
}

// --- PLAYER SYSTEM ---
let isLogin = true;
function toggleMode() { isLogin = !isLogin; document.getElementById('auth-title').innerText = isLogin ? "PLAYER LOGIN" : "REGISTER"; }

function handleAuth() {
    const ph = document.getElementById('u-phone').value;
    const ps = document.getElementById('u-pass').value;
    const email = ph + "@miki.com";
    if(isLogin) auth.signInWithEmailAndPassword(email, ps).then(r => startApp(r.user)).catch(e => alert("Login Fail!"));
    else auth.createUserWithEmailAndPassword(email, ps).then(r => { alert("Created!"); toggleMode(); });
}

async function startApp(user) {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    const uRef = db.collection("Users").doc(user.uid);
    const snap = await uRef.get();
    if(!snap.exists) await uRef.set({ phone: user.email.split('@')[0], wallet_balance: 0, uid: "" });
    uRef.onSnapshot(doc => { 
        document.getElementById('bal').innerText = "₹" + (doc.data().wallet_balance || 0);
    });
    loadMatches();
}

function loadMatches() {
    db.collection("Matches").onSnapshot(snap => {
        let h = "";
        snap.forEach(d => {
            const m = d.data();
            const mid = d.id;
            h += `<div class="match-card">
                <div class="time-badge">⏰ TIME: ${m.time || 'TBA'}</div>
                <div style="font-weight:bold; color:var(--main); font-size:18px;">${m.title}</div>
                <div style="font-size:12px; margin:5px 0;">Entry: ₹${m.entryFee} | Prize: ${m.prize}</div>
                <button class="btn" style="padding:10px;" onclick="joinMatch('${mid}', ${m.entryFee})">JOIN MATCH</button>
                <div class="room-info">${m.roomId ? `ID: ${m.roomId} | PASS: ${m.password}<br><small>Ready to Play!</small>` : 'ID/Pass will appear 10m before match'}</div>
                <div class="player-list" id="p-list-${mid}">
                    <small style="color:var(--main);">JOINED PLAYERS:</small>
                    <div id="inner-list-${mid}">Loading...</div>
                </div>
            </div>`;
            fetchPlayers(mid);
        });
        document.getElementById('match-list').innerHTML = h || "No Matches.";
    });
}

function fetchPlayers(mid) {
    db.collection("Matches").doc(mid).collection("Players").onSnapshot(snap => {
        let h = "";
        snap.forEach(p => {
            const pd = p.data().players[0];
            h += `<div class="p-item"><span>👤 ${pd.playerName}</span><span>UID: ${pd.playerUid}</span></div>`;
        });
        const el = document.getElementById('inner-list-' + mid);
        if(el) el.innerHTML = h || "Empty Slot.";
    });
}

async function joinMatch(mid, fee) {
    const user = auth.currentUser;
    const uRef = db.collection("Users").doc(user.uid);
    const snap = await uRef.get();
    const bal = snap.data().wallet_balance || 0;
    if(bal < fee) return alert("Paisa kam hai!");

    let n = prompt("FF Name:"); let u = prompt("FF UID:");
    if(!n || !u) return alert("Details required!");

    await uRef.update({ wallet_balance: bal - fee, uid: u });
    await db.collection("Matches").doc(mid).collection("Players").doc(user.uid).set({
        players: [{playerName: n, playerUid: u}],
        wallet: snap.data().phone
    });
    document.getElementById('rules-modal').classList.remove('hidden');
}

function closeRules() { document.getElementById('rules-modal').classList.add('hidden'); }

// --- ADMIN TOOLS ---
async function updateRoom() {
    const mid = document.getElementById('m-id').value;
    await db.collection("Matches").doc(mid).update({
        time: document.getElementById('m-time').value,
        roomId: document.getElementById('r-id').value,
        password: document.getElementById('r-ps').value
    });
    alert("✅ Success!");
    document.getElementById('r-id').value = ""; document.getElementById('r-ps').value = "";
}

async function addCash() {
    const ph = document.getElementById('t-uid').value;
    const amt = parseInt(document.getElementById('a-amt').value);
    const q = await db.collection("Users").where("phone", "==", ph).get();
    if(q.empty) return alert("User not found!");
    await q.docs[0].ref.update({ wallet_balance: firebase.firestore.FieldValue.increment(amt) });
    alert("✅ Added!");
}

async function openPaymentGateway() {
    const amt = prompt("Amount:", "50");
    const snap = await db.collection("Users").doc(auth.currentUser.uid).get();
    var options = { "key": "rzp_test_SZjeJci3fwjpfS", "amount": parseInt(amt) * 100, "name": "MIKI ESPORTS", "handler": async function (r){ 
        await db.collection("Users").doc(auth.currentUser.uid).update({ wallet_balance: firebase.firestore.FieldValue.increment(parseInt(amt)) }); 
        alert("Success!"); 
    }, "prefill": { "contact": snap.data().phone }, "theme": { "color": "#00f2fe" } };
    new Razorpay(options).open();
}
</script>
</body>
</html>
