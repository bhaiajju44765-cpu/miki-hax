<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MIKI ESPORTS FINAL</title>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif;text-align:center}
.box{background:#111;padding:20px;margin:10px;border-radius:10px}
input,textarea{padding:10px;margin:5px;width:85%;background:#222;color:#fff;border:none}
button{padding:10px;margin:5px;background:#00f2fe;border:none;font-weight:bold;border-radius:5px}
.hidden{display:none}
</style>
</head>

<body>

<h2>🔥 MIKI ESPORTS 🔥</h2>

<!-- LOGIN -->
<div id="auth" class="box">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="phone" placeholder="Phone (register)">
<br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dash" class="box hidden">
<h3>Balance: ₹<span id="bal">0</span></h3>

<input id="name" placeholder="IGN Name">
<input id="uid" placeholder="Game UID">

<h4>🎮 Matches</h4>
<div id="matches"></div>

<!-- MESSAGE -->
<div class="box">
<h4>📩 Contact Admin</h4>
<textarea id="msg"></textarea>
<button onclick="sendMsg()">Send</button>
</div>

<div id="replyBox" class="box hidden">
<h4>📨 Admin Reply</h4>
<p id="reply"></p>
</div>

<button onclick="logout()">Logout</button>
</div>

<!-- ADMIN -->
<div id="admin" class="box hidden">
<h3>👑 ADMIN PANEL</h3>

<input id="secret" placeholder="Secret Key">
<button onclick="unlock()">Unlock</button>

<div id="panel" class="hidden">

<h4>Create Match</h4>
<input id="mId" placeholder="Match ID">
<input id="mTime" placeholder="Time">
<input id="mRoom" placeholder="Room ID">
<input id="mPass" placeholder="Room Pass">
<input id="mPrize" placeholder="Prize">
<button onclick="createMatch()">Create Match</button>

<h4>Player Control</h4>
<input id="tUid" placeholder="User UID">
<input id="amt" placeholder="Amount">
<button onclick="addCash()">Add Cash</button>
<button onclick="ban()">Ban</button>
<button onclick="unban()">Unban</button>

<h4>👥 All Users</h4>
<button onclick="loadUsers()">Load Users</button>
<div id="users"></div>

<h4>📬 Messages</h4>
<button onclick="loadMsgs()">Load Messages</button>
<div id="msgs"></div>

</div>
</div>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyDiVgQ-FMis2N77nHu6dTY17aTPpmBrNL4",
 authDomain: "miki-turnament-93d48.firebaseapp.com",
 projectId: "miki-turnament-93d48"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 🔥 ADMIN SETTINGS
const ADMIN_UID = "SPzQMnoqVYdVnQR81RCcb9r9lLy1";
const SECRET_KEY = "MIKI-999";

// AUTH STATE
auth.onAuthStateChanged(async user=>{
 if(user){
  const doc = await db.collection("Users").doc(user.uid).get();
  const data = doc.data();

  if(data.isBanned){
    document.body.innerHTML="<h1 style='color:red'>BANNED</h1>";
    return;
  }

  document.getElementById("auth").style.display="none";
  document.getElementById("dash").classList.remove("hidden");

  document.getElementById("bal").innerText = data.wallet_balance || 0;

  if(user.uid === ADMIN_UID){
    document.getElementById("admin").classList.remove("hidden");
  }

  db.collection("Users").doc(user.uid).onSnapshot(d=>{
    if(d.data().adminReply){
      document.getElementById("replyBox").classList.remove("hidden");
      document.getElementById("reply").innerText = d.data().adminReply;
    }
  });

  loadMatches();
 }
});

// REGISTER
async function register(){
 const res = await auth.createUserWithEmailAndPassword(email.value,pass.value);

 await db.collection("Users").doc(res.user.uid).set({
  email: email.value,
  phone: phone.value,
  wallet_balance: 0,
  isBanned: false
 });

 alert("Registered Successfully");
}

// LOGIN
function login(){
 auth.signInWithEmailAndPassword(email.value,pass.value);
}

// LOGOUT
function logout(){
 auth.signOut();
}

// LOAD MATCHES
async function loadMatches(){
 const snap = await db.collection("Matches").get();
 let html="";
 snap.forEach(doc=>{
  const m = doc.data();

  html += `
  <div class="box">
  <b>${m.id}</b><br>
  Time: ${m.time}<br>
  Prize: ₹${m.prize}<br>
  <button onclick="join('${doc.id}')">Join ₹10</button>
  </div>`;
 });
 matches.innerHTML = html;
}

// JOIN MATCH
async function join(id){
 const ref = db.collection("Users").doc(auth.currentUser.uid);

 await db.runTransaction(async t=>{
  const doc = await t.get(ref);
  let bal = doc.data().wallet_balance;

  if(bal < 10) throw "Low balance";

  t.update(ref,{wallet_balance: bal - 10});
 });

 const match = await db.collection("Matches").doc(id).get();
 const m = match.data();

 alert("ROOM ID: " + m.roomId + "\nPASS: " + m.pass);

 await db.collection("Matches")
 .doc(id)
 .collection("Players")
 .doc(auth.currentUser.uid)
 .set({
  name: name.value,
  uid: uid.value
 });

}

// ADMIN UNLOCK
function unlock(){
 if(auth.currentUser.uid !== ADMIN_UID) return alert("Not Admin");

 if(secret.value === SECRET_KEY){
  document.getElementById("panel").classList.remove("hidden");
 }
}

// CREATE MATCH
async function createMatch(){
 await db.collection("Matches").doc(mId.value).set({
  id: mId.value,
  time: mTime.value,
  roomId: mRoom.value,
  pass: mPass.value,
  prize: mPrize.value
 });

 alert("Match Created");
}

// CASH
async function addCash(){
 const ref = db.collection("Users").doc(tUid.value);

 await db.runTransaction(async t=>{
  const doc = await t.get(ref);
  let bal = doc.data().wallet_balance || 0;

  t.update(ref,{wallet_balance: bal + Number(amt.value)});
 });

 alert("Cash Added");
}

// BAN
function ban(){
 db.collection("Users").doc(tUid.value).update({isBanned:true});
}

// UNBAN
function unban(){
 db.collection("Users").doc(tUid.value).update({isBanned:false});
}

// USERS
async function loadUsers(){
 const snap = await db.collection("Users").get();
 let html="";
 snap.forEach(doc=>{
  let d = doc.data();
  html += `<div class="box">${doc.id} | ₹${d.wallet_balance}</div>`;
 });
 users.innerHTML = html;
}

// MESSAGE
function sendMsg(){
 db.collection("Messages").add({
  uid: auth.currentUser.uid,
  msg: msg.value
 });
 alert("Message Sent");
}

// ADMIN MESSAGES
async function loadMsgs(){
 const snap = await db.collection("Messages").get();
 let html="";
 snap.forEach(doc=>{
  let d = doc.data();
  html += `
  <div class="box">
  ${d.msg}
  <input id="r${doc.id}">
  <button onclick="replyUser('${d.uid}','${doc.id}')">Reply</button>
  </div>`;
 });
 msgs.innerHTML = html;
}

function replyUser(uid,id){
 let txt = document.getElementById("r"+id).value;
 db.collection("Users").doc(uid).update({adminReply:txt});
}
</script>

</body>
</html>
