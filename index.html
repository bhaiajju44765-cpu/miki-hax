<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIKI ESPORTS | ULTIMATE HUB</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        :root { --main: #00f2fe; --accent: #ff0055; --bg: #0a0e17; --card: #161b29; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; margin: 0; user-select: none; }
        .header { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--main); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--main), #4facfe); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .hidden { display: none !important; }

        /* Overlays */
        .full-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 15px; width: 85%; border: 1px solid var(--main); box-shadow: 0 0 30px rgba(0,242,254,0.2); }

        /* Match Design */
        .match-card { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; border-left: 4px solid var(--main); }
        .time-badge { background: rgba(0,242,254,0.1); color: var(--main); padding: 4px 10px; border-radius: 4px; font-size: 11px; margin-bottom: 10px; display: inline-block; border: 1px solid rgba(0,242,254,0.3); }
        .room-info { background: rgba(255,202,40,0.05); border: 1px dashed #ffca28; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; color: #ffca28; font-size: 12px; }
        .player-row { display: flex; justify-content: space-between; font-size: 11px; padding: 5px 0; color: #aaa; border-bottom: 1px solid #222; }

        #camera-view { width: 220px; height: 220px; border-radius: 50%; border: 3px solid var(--main); object-fit: cover; }
        .scan-timer { color: var(--main); font-size: 18px; margin-bottom: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div id="face-scan-overlay" class="full-overlay hidden">
    <div style="text-align:center;">
        <div class="scan-timer" id="timer-txt">SCANNING: 5s</div>
        <video id="camera-view" autoplay playsinline></video>
        <div id="denied-msg" class="hidden" style="color:#ff4444; font-weight:bold; margin-top:20px; font-size:20px;">ACCESS DENIED ❌</div>
    </div>
</div>

<div id="join-page" class="full-overlay hidden">
    <div class="modal-box">
        <h3 style="color:var(--main); margin-top:0;">ENTER MISSION</h3>
        <input type="text" id="p-name" placeholder="In-Game Name">
        <input type="text" id="p-uid" placeholder="Free Fire UID">
        <div id="join-fee-info" style="font-size:13px; margin:10px 0; color:#0f8; font-weight:bold;"></div>
        <button class="btn" onclick="submitJoinRequest()">CONFIRM & DEDUCT</button>
        <button class="btn" style="background:#333; color:#fff;" onclick="closeJoinPage()">CANCEL</button>
    </div>
</div>

<div class="header">
    <div style="width:30px;"></div>
    <div style="font-weight:900; color:var(--main); letter-spacing:1px;">MIKI ESPORTS</div>
    <div id="admin-trigger" style="font-size:24px; cursor:pointer;">🏆</div>
</div>

<div class="container">
    <div id="auth-section" class="card hidden" style="text-align:center;">
        <h3>PLAYER LOGIN</h3>
        <input type="number" id="u-phone" placeholder="Mobile Number">
        <input type="password" id="u-pass" placeholder="Password">
        <button class="btn" onclick="handleAuth()">LOGIN</button>
        <p style="font-size:12px; color:#aaa; cursor:pointer;" onclick="toggleMode()">New? Register Now</p>
    </div>

    <div id="dashboard" class="hidden">
        <div class="card" style="display:flex; justify-content:space-between; align-items:center; border:1px solid var(--main);">
            <div><small style="color:#888;">CREDITS</small><div id="bal" style="font-size:28px; font-weight:bold; color:var(--main);">₹0</div></div>
            <button onclick="openPaymentGateway()" class="btn" style="width:auto; padding:8px 15px; margin:0;">ADD CASH</button>
        </div>
        <h4>LIVE TOURNAMENTS</h4>
        <div id="match-list">Searching for missions...</div>
        <button class="btn" style="background:#222; color:#ff4444; border:1px solid #444;" onclick="logout()">LOGOUT ACCOUNT</button>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="card" style="border-color: var(--accent);">
            <h3 style="color:var(--accent);">COMMAND CENTER</h3>
            <input type="text" id="m-id" placeholder="Match ID (M1)">
            <input type="text" id="m-time" placeholder="Time (10:00 PM)">
            <input type="text" id="r-id" placeholder="Room ID">
            <input type="text" id="r-ps" placeholder="Room Pass">
            <button class="btn" onclick="updateRoom()">PUSH UPDATE</button>
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            <input type="text" id="t-uid" placeholder="Player Phone Number">
            <input type="number" id="a-amt" placeholder="Amount (₹)">
            <button class="btn" onclick="addCash()">RECHARGE WALLET</button>
        </div>
    </div>
</div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
    apiKey: "AIzaSyDiVgQ-FMis2N77nHu6dTY17aTPpmBrNL4",
    authDomain: "miki-turnament-93d48.firebaseapp.com",
    projectId: "miki-turnament-93d48",
    storageBucket: "miki-turnament-93d48.firebasestorage.app",
    messagingSenderId: "832870643730",
    appId: "1:832870643730:web:ff17abcb9652a4acd2c0cb"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- REFRESH PERSISTENCE (AUTO LOGIN) ---
auth.onAuthStateChanged(user => {
    if (user) { startApp(user); } 
    else { document.getElementById('auth-section').classList.remove('hidden'); document.getElementById('dashboard').classList.add('hidden'); }
});

// --- ADMIN SECURITY ---
let clicks = 0;
document.getElementById('admin-trigger').onclick = () => {
    clicks++; if(clicks === 7) { clicks=0; runScan(); }
};

async function runScan() {
    const overlay = document.getElementById('face-scan-overlay');
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    overlay.classList.remove('hidden');
    document.getElementById('camera-view').srcObject = stream;
    let t = 5;
    const itv = setInterval(() => {
        t--; document.getElementById('timer-txt').innerText = `SCANNING: ${t}s`;
        if(t <= 0) {
            clearInterval(itv);
            document.getElementById('denied-msg').classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.add('hidden');
                document.getElementById('denied-msg').classList.add('hidden');
                stream.getTracks().forEach(track => track.stop());
                if(confirm("ONLY admin login please enter password")) {
                    if(prompt("Master Password:") === "Priyanshu7") {
                        document.getElementById('admin-panel').classList.remove('hidden');
                        document.getElementById('dashboard').classList.add('hidden');
                    }
                }
            }, 1500);
        }
    }, 1000);
}

// --- AUTH LOGIC ---
let isLogin = true;
function toggleMode() { isLogin = !isLogin; document.querySelector('h3').innerText = isLogin ? "PLAYER LOGIN" : "REGISTER"; }
function handleAuth() {
    const ph = document.getElementById('u-phone').value;
    const ps = document.getElementById('u-pass').value;
    const email = ph + "@miki.com";
    if(isLogin) auth.signInWithEmailAndPassword(email, ps).catch(e => alert("Login Refused!"));
    else auth.createUserWithEmailAndPassword(email, ps).then(() => toggleMode());
}
function logout() { auth.signOut(); location.reload(); }

async function startApp(user) {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    const uRef = db.collection("Users").doc(user.uid);
    const snap = await uRef.get();
    if(!snap.exists) await uRef.set({ phone: user.email.split('@')[0], wallet_balance: 0, uid: "" });
    uRef.onSnapshot(doc => { 
        document.getElementById('bal').innerText = "₹" + (doc.data().wallet_balance || 0);
    });
    loadMatches();
}

// --- MATCH & JOIN SYSTEM (FIXED UNDEFINED) ---
function loadMatches() {
    db.collection("Matches").onSnapshot(snap => {
        let h = "";
        snap.forEach(d => {
            const m = d.data();
            const mid = d.id;

            // God-Level Spelling Checker
            const title = m.title || m.Title || m.titel || "Match Mission";
            const fee = m.entryFee || m.EntryFee || m.fee || 0;
            const prize = m.prize || m.Prize || "N/A";
            const time = m.time || m.Time || "TBA";

            h += `<div class="match-card">
                <div class="time-badge">⏰ MISSION TIME: ${time}</div>
                <div style="font-weight:bold; color:var(--main); font-size:20px;">${title}</div>
                <div style="font-size:12px; margin:5px 0; color:#aaa;">Entry: ₹${fee} | Prize: ${prize}</div>
                <button class="btn" style="padding:12px;" onclick="openJoinPage('${mid}', ${fee})">JOIN MATCH</button>
                <div class="room-info">${m.roomId ? `ID: ${m.roomId} | PASS: ${m.password}` : 'Room Access: 10m before start'}</div>
                <div style="margin-top:15px;"><small style="color:var(--main); font-weight:bold;">ALIVE WARRIORS:</small><div id="plist-${mid}">Loading...</div></div>
            </div>`;
            fetchPlayers(mid);
        });
        document.getElementById('match-list').innerHTML = h || "No Active Missions.";
    });
}

function fetchPlayers(mid) {
    db.collection("Matches").doc(mid).collection("Players").onSnapshot(snap => {
        let h = "";
        snap.forEach(p => {
            const pd = p.data().players ? p.data().players[0] : {playerName: "Guest", playerUid: "000"};
            h += `<div class="player-row"><span>👤 ${pd.playerName}</span><span style="color:var(--main);">UID: ${pd.playerUid}</span></div>`;
        });
        const el = document.getElementById('plist-' + mid);
        if(el) el.innerHTML = h || "Join now to start!";
    });
}

let activeMatch = { id: "", fee: 0 };
function openJoinPage(id, fee) {
    activeMatch = { id: id, fee: Number(fee) };
    document.getElementById('join-fee-info').innerText = "FEE TO DEDUCT: ₹" + fee;
    document.getElementById('join-page').classList.remove('hidden');
}
function closeJoinPage() { document.getElementById('join-page').classList.add('hidden'); }

async function submitJoinRequest() {
    const name = document.getElementById('p-name').value;
    const puid = document.getElementById('p-uid').value;
    if(!name || !puid) return alert("All details required!");

    const user = auth.currentUser;
    const uRef = db.collection("Users").doc(user.uid);
    const snap = await uRef.get();
    const bal = snap.data().wallet_balance || 0;

    if(bal < activeMatch.fee) return alert("Insufficient Credits!");

    try {
        // AUTOMATIC BALANCE DEDUCTION
        await uRef.update({ 
            wallet_balance: firebase.firestore.FieldValue.increment(-activeMatch.fee),
            uid: puid 
        });

        await db.collection("Matches").doc(activeMatch.id).collection("Players").doc(user.uid).set({
            players: [{playerName: name, playerUid: puid}],
            status: "PAID"
        });

        closeJoinPage();
        alert("✅ MISSION JOINED! ₹" + activeMatch.fee + " deducted.");
    } catch (e) { alert("Error: " + e.message); }
}

// --- ADMIN TOOLS ---
async function addCash() {
    const ph = document.getElementById('t-uid').value.trim();
    const amt = parseInt(document.getElementById('a-amt').value);
    let q = await db.collection("Users").where("phone", "==", ph).get();
    if(q.empty) q = await db.collection("Users").where("phone", "==", Number(ph)).get();
    if(q.empty) return alert("❌ User Not Found!");
    await q.docs[0].ref.update({ wallet_balance: firebase.firestore.FieldValue.increment(amt) });
    alert("✅ Added ₹" + amt + " to " + ph);
}

async function updateRoom() {
    const mid = document.getElementById('m-id').value;
    if(!mid) return alert("Enter Match ID!");
    await db.collection("Matches").doc(mid).set({
        time: document.getElementById('m-time').value,
        roomId: document.getElementById('r-id').value,
        password: document.getElementById('r-ps').value
    }, { merge: true });
    alert("✅ Room Data Updated!");
}

async function openPaymentGateway() {
    const amt = prompt("Amount:", "100");
    const snap = await db.collection("Users").doc(auth.currentUser.uid).get();
    var options = { "key": "rzp_test_SZjeJci3fwjpfS", "amount": parseInt(amt) * 100, "name": "MIKI ESPORTS", "handler": async function (r){ 
        await db.collection("Users").doc(auth.currentUser.uid).update({ wallet_balance: firebase.firestore.FieldValue.increment(parseInt(amt)) }); 
        alert("Credits Added!"); 
    }, "prefill": { "contact": snap.data().phone }, "theme": { "color": "#00f2fe" } };
    new Razorpay(options).open();
}
</script>
</body>
</html>
