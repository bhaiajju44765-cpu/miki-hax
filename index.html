<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIKI ESPORTS | HACKER TERMINAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #111; --red: #ff0000; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 0; user-select: none; }
        
        /* Hacker Header */
        .header { background: #000; padding: 15px; text-align: center; border-bottom: 1px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        
        /* Black Hat Hacker Symbol (Secret Trigger) */
        .hacker-logo { 
            width: 50px; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 0 5px var(--main));
            display: block; margin: 0 auto 5px auto;
        }
        .hacker-logo:active { transform: scale(0.9); }

        .container { padding: 20px; max-width: 420px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #222; box-shadow: 0 0 15px rgba(0,255,136,0.1); margin-bottom: 20px; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--main); color: var(--main); border-radius: 5px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 12px; background: var(--main); border: none; color: #000; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; }
        .hidden { display: none; }

        /* Dashboard UI */
        .wallet-card { border: 1px solid var(--main); padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #001100; border-radius: 8px; }
        .match-card { border-left: 3px solid var(--main); padding: 15px; background: #0a0a0a; margin-top: 15px; border-radius: 5px; }

        /* Admin Face Scan */
        #video { border: 2px solid var(--red); border-radius: 10px; display: block; margin: 10px auto; background: #000; }
        .scan-line { width: 100%; height: 2px; background: var(--red); position: absolute; animation: scan 2s infinite; }
        @keyframes scan { 0% { top:0; } 100% { top:100%; } }
    </style>
</head>
<body>

<div class="header">
    <img src="https://cdn-icons-png.flaticon.com/512/940/940544.png" class="hacker-logo" id="admin-trigger" alt="Hacker">
    <div style="color:var(--main); font-size:12px; letter-spacing:2px;">MIKI ESPORTS</div>
</div>

<div class="container">
    <div id="auth-section" class="card">
        <h3 id="auth-title" style="color:var(--main); margin-top:0;">SYSTEM LOGIN</h3>
        <input type="number" id="u-phone" placeholder="Mobile Number">
        <input type="password" id="u-pass" placeholder="Password (Min 6 chars)">
        <button class="btn" id="auth-btn" onclick="handleAuth()">ACCESS SYSTEM</button>
        <p style="font-size:11px; color:#555; margin-top:15px; cursor:pointer;" id="toggle-auth" onclick="toggleAuth()">[ NEW PLAYER? CREATE PASSWORD ]</p>
    </div>

    <div id="dashboard" class="hidden">
        <div class="wallet-card">
            <div>
                <div style="font-size:10px; color:var(--main);">WALLET_CREDITS</div>
                <div id="wallet-balance" style="font-size:24px; font-weight:bold;">₹0</div>
            </div>
            <button class="btn" style="width:auto; padding:5px 10px; font-size:10px;" onclick="alert('Contact Admin for Recharge')">RECHARGE</button>
        </div>
        <h4 style="color:var(--main); margin-bottom:5px; margin-top:20px;">> ACTIVE_MISSIONS</h4>
        <div id="match-list"></div>
    </div>

    <div id="admin-panel" class="hidden" style="border:1px solid var(--red); padding:15px; background:#0a0000; border-radius:10px;">
        <div id="face-auth-ui" style="text-align:center; position:relative;">
            <h4 style="color:var(--red);">ADMIN VERIFICATION</h4>
            <video id="video" width="180" height="135" autoplay></video>
            <button class="btn" style="background:var(--red); color:#fff;" onclick="verifyAdmin()">START SCAN</button>
        </div>
        <div id="admin-controls" class="hidden">
            <h3 style="color:var(--red); text-align:center;">MASTER TERMINAL</h3>
            <input type="text" id="m-id" placeholder="Match ID">
            <input type="text" id="r-id" placeholder="Room ID">
            <input type="text" id="r-ps" placeholder="Room Pass">
            <button class="btn" style="background:var(--red); color:#fff;" onclick="updateRoom()">PUSH TO LIVE</button>
            <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
            <input type="text" id="t-uid" placeholder="Player UID">
            <input type="number" id="a-amt" placeholder="Amount (₹)">
            <button class="btn" onclick="addCash()">ADD CASH</button>
        </div>
    </div>
</div>

<script>
// --- FIREBASE SETUP ---
const firebaseConfig = {
    apiKey: "AIzaSyDiVgQ-FMis2N77nHu6dTY17aTPpmBrNL4",
    authDomain: "miki-turnament-93d48.firebaseapp.com",
    projectId: "miki-turnament-93d48",
    storageBucket: "miki-turnament-93d48.firebasestorage.app",
    messagingSenderId: "832870643730",
    appId: "1:832870643730:web:ff17abcb9652a4acd2c0cb"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let isLogin = true;

function toggleAuth() {
    isLogin = !isLogin;
    document.getElementById('auth-title').innerText = isLogin ? "SYSTEM LOGIN" : "CREATE ACCOUNT";
    document.getElementById('auth-btn').innerText = isLogin ? "ACCESS SYSTEM" : "INITIALIZE ACCOUNT";
    document.getElementById('toggle-auth').innerText = isLogin ? "[ NEW PLAYER? CREATE PASSWORD ]" : "[ ALREADY HAVE ACCESS? LOGIN ]";
}

function handleAuth() {
    const phone = document.getElementById('u-phone').value;
    const pass = document.getElementById('u-pass').value;
    if(phone.length !== 10 || pass.length < 6) return alert("10 Digit Phone & 6 Digit Pass Required!");

    const email = phone + "@miki.com";
    if(isLogin) {
        auth.signInWithEmailAndPassword(email, pass).then(res => startApp(res.user)).catch(e => alert(e.message));
    } else {
        auth.createUserWithEmailAndPassword(email, pass).then(() => {
            alert("Account Ready! Now Login.");
            toggleAuth();
        }).catch(e => alert(e.message));
    }
}

async function startApp(user) {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');

    const uRef = db.collection("Users").doc(user.uid);
    const snap = await uRef.get();
    if(!snap.exists) await uRef.set({ phone: user.email.split('@')[0], wallet_balance: 0, uid: user.uid });

    uRef.onSnapshot(doc => {
        document.getElementById('wallet-balance').innerText = "₹" + (doc.data().wallet_balance || 0);
    });
    loadMatches();
}

function loadMatches() {
    db.collection("Matches").onSnapshot(snap => {
        let h = "";
        snap.forEach(d => {
            const m = d.data();
            h += `<div class="match-card">
                <b style="color:var(--main);">${m.title || 'FF TOURNAMENT'}</b><br>
                <small>Entry: ₹${m.entryFee} | Prize: ₹${m.prize}</small>
                <button class="btn" style="padding:5px; font-size:10px; margin-top:8px;" onclick="joinMatch('${d.id}', ${m.entryFee})">JOIN MISSION</button>
                ${m.roomId ? `<div style="color:yellow; font-size:11px; margin-top:5px; border:1px dashed #444; padding:5px;">ID: ${m.roomId} | PASS: ${m.password}</div>` : ''}
            </div>`;
        });
        document.getElementById('match-list').innerHTML = h;
    });
}

async function joinMatch(id, fee) {
    const user = auth.currentUser;
    const uRef = db.collection("Users").doc(user.uid);
    const snap = await uRef.get();
    const bal = snap.data().wallet_balance;

    if(bal >= fee) {
        const gameId = prompt("Enter In-Game Name (Level 50+):");
        if(!gameId) return;
        await uRef.update({ wallet_balance: bal - fee });
        await db.collection("Matches").doc(id).collection("Players").doc(user.uid).set({ name: gameId, uid: user.uid });
        alert("Mission Joined!");
    } else { alert("Insufficient Credits!"); }
}

// --- ADMIN SECRET TRIGGER (7 CLICKS) ---
let clicks = 0;
document.getElementById('admin-trigger').onclick = () => {
    clicks++;
    if(clicks === 7) {
        let p = prompt("MASTER KEY:");
        if(p === "BAN MASTER") {
            document.getElementById('admin-panel').classList.remove('hidden');
            startCam();
        }
        clicks = 0;
    }
};

async function startCam() {
    try {
        const s = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('video').srcObject = s;
    } catch(e) { alert("Camera Error!"); }
}

function verifyAdmin() {
    const btn = event.target;
    btn.innerText = "SCANNING...";
    setTimeout(() => {
        document.getElementById('face-auth-ui').classList.add('hidden');
        document.getElementById('admin-controls').classList.remove('hidden');
        const tracks = document.getElementById('video').srcObject.getTracks();
        tracks.forEach(t => t.stop());
    }, 2000);
}

// Admin Backend Functions

    const rid = document.getElementById('r-id').
