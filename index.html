<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIKI ESPORTS | PRO TERMINAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        :root { --main: #00f2fe; --accent: #ff0055; --bg: #0a0e17; --card: #161b29; --text: #fff; --gold: #ffd700; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; margin: 0; user-select: none; overflow-x: hidden; }
        
        /* Header & Logo Section */
        .header { background: #000; padding: 12px 20px; border-bottom: 2px solid var(--main); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 35px; height: 35px; background: linear-gradient(45deg, var(--main), var(--accent)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; box-shadow: 0 0 10px var(--main); }
        .insta-btn { font-size: 22px; text-decoration: none; filter: drop-shadow(0 0 5px #e1306c); transition: 0.3s; }
        .insta-btn:hover { transform: scale(1.2); }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); position: relative; }
        
        /* Reward System UI */
        .reward-card { background: linear-gradient(135deg, #1e263a, #111); border: 1px solid var(--gold); }
        .progress-box { background: #000; height: 10px; border-radius: 5px; margin: 15px 0; border: 1px solid #333; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #ff8c00); width: 0%; transition: 0.5s; box-shadow: 0 0 10px var(--gold); }
        .claim-btn { background: var(--gold) !important; color: #000 !important; font-weight: 900 !important; opacity: 0.4; cursor: not-allowed; }
        .claim-btn.active { opacity: 1; cursor: pointer; animation: glow 1.5s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--gold); } 50% { box-shadow: 0 0 20px var(--gold); } 100% { box-shadow: 0 0 5px var(--gold); } }

        /* General UI Elements */
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--main), #4facfe); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .hidden { display: none !important; }

        /* Full Page Overlays */
        .full-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 15px; width: 85%; border: 1px solid var(--main); text-align: center; }

        /* Match Cards */
        .match-card { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; border-left: 4px solid var(--main); }
        .time-badge { background: rgba(0,242,254,0.1); color: var(--main); padding: 4px 10px; border-radius: 4px; font-size: 11px; margin-bottom: 10px; display: inline-block; }
        .kill-text { color: #0f8; font-size: 12px; font-weight: bold; margin: 8px 0; display: block; }
        .room-info { background: rgba(255,202,40,0.05); border: 1px dashed #ffca28; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; color: #ffca28; font-size: 11px; }

        #camera-view { width: 220px; height: 220px; border-radius: 50%; border: 3px solid var(--main); object-fit: cover; }
    </style>
</head>
<body>

<div id="deposit-page" class="full-overlay hidden">
    <div class="modal-box">
        <h3 style="color:var(--main); margin-top:0;">ADD CASH</h3>
        <p style="font-size:12px; color:#aaa;">Minimum recharge: ₹40</p>
        <input type="number" id="dep-amt" placeholder="Enter Amount (₹)">
        <button class="btn" onclick="processDeposit()">PROCEED TO PAY</button>
        <button class="btn" style="background:#333; color:#fff;" onclick="document.getElementById('deposit-page').classList.add('hidden')">CANCEL</button>
    </div>
</div>

<div id="join-page" class="full-overlay hidden">
    <div class="modal-box">
        <h3 style="color:var(--main); margin-top:0;">CONFIRM ENTRY</h3>
        <input type="text" id="p-name" placeholder="Free Fire Name">
        <input type="text" id="p-uid" placeholder="Free Fire UID">
        <div style="color:#0f8; font-weight:bold; margin:10px 0;">ENTRY FEE: ₹10</div>
        <button class="btn" onclick="submitJoinRequest()">PAY ₹10 & JOIN</button>
        <button class="btn" style="background:#333; color:#fff;" onclick="document.getElementById('join-page').classList.add('hidden')">CANCEL</button>
    </div>
</div>

<div id="face-scan-overlay" class="full-overlay hidden">
    <div style="text-align:center;">
        <div style="color:var(--main); font-family:monospace; margin-bottom:10px;" id="timer-txt">SCANNING: 5s</div>
        <video id="camera-view" autoplay playsinline></video>
    </div>
</div>

<div class="header">
    <div class="logo-box">
        <div class="logo-img">M</div>
        <div style="font-weight:900; color:var(--main); font-size:16px;">MIKI ESPORTS</div>
    </div>
    <div style="display:flex; gap:18px; align-items:center;">
        <a href="https://www.instagram.com/_prime_miku_?igsh=Y296bXdpZGl5dzFs" target="_blank" class="insta-btn">📸</a>
        <div id="admin-trigger" style="font-size:24px; cursor:pointer;">🏆</div>
    </div>
</div>

<div class="container">
    <div id="auth-section" class="card hidden" style="text-align:center;">
        <h3>PLAYER LOGIN</h3>
        <input type="number" id="u-phone" placeholder="Mobile Number">
        <input type="password" id="u-pass" placeholder="Password">
        <button class="btn" onclick="handleAuth()">LOGIN</button>
        <p style="font-size:12px; color:#aaa; cursor:pointer;" onclick="toggleMode()">Register Account</p>
    </div>

    <div id="dashboard" class="hidden">
        <div class="card reward-card">
            <div style="color:var(--gold); font-weight:bold; font-size:14px;">🎁 REWARD: ₹29 REDEEM CODE</div>
            <div class="progress-box"><div class="progress-fill" id="reward-progress"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:11px; color:#ccc;">
                <span id="match-count-txt">Matches Played: 0/20</span>
                <span>Play 20 matches to unlock</span>
            </div>
            <button class="btn claim-btn" id="claim-btn" onclick="claimReward()">CLAIM CODE</button>
        </div>

        <div class="card" style="display:flex; justify-content:space-between; align-items:center; border:1px solid var(--main);">
            <div><small style="color:#888;">WALLET</small><div id="bal" style="font-size:28px; font-weight:bold; color:var(--main);">₹0</div></div>
            <button onclick="document.getElementById('deposit-page').classList.remove('hidden')" class="btn" style="width:auto; padding:10px 20px; margin:0;">ADD CASH</button>
        </div>
        
        <h4>ACTIVE MISSIONS</h4>
        <div id="match-list">Loading matches...</div>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="card" style="border-color: var(--accent);">
            <h3>ADMIN CONTROL</h3>
            <input type="text" id="m-id" placeholder="Match ID (M1)">
            <input type="text" id="m-time" placeholder="Match Time">
            <input type="text" id="r-id" placeholder="Room ID">
            <input type="text" id="r-ps" placeholder="Room Pass">
            <button class="btn" onclick="updateRoom()">UPDATE MATCH</button>
            <button class="btn" style="background:#f44; color:#fff;" onclick="deleteMatch()">DELETE MATCH</button>
            <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
            <input type="text" id="t-uid" placeholder="Phone Number">
            <input type="number" id="a-amt" placeholder="Amount">
            <button class="btn" onclick="addCash()">ADD CASH</button>
        </div>
    </div>
</div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
    apiKey: "AIzaSyDiVgQ-FMis2N77nHu6dTY17aTPpmBrNL4",
    authDomain: "miki-turnament-93d48.firebaseapp.com",
    projectId: "miki-turnament-93d48",
    storageBucket: "miki-turnament-93d48.firebasestorage.app",
    messagingSenderId: "832870643730",
    appId: "1:832870643730:web:ff17abcb9652a4acd2c0cb"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const ENTRY_FEE = 10;
const REWARD_LIMIT = 20;

// --- AUTO LOGIN ---
auth.onAuthStateChanged(user => { if(user) startApp(user); else document.getElementById('auth-section').classList.remove('hidden'); });

async function startApp(user) {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    const uRef = db.collection("Users").doc(user.uid);
    const snap = await uRef.get();
    if(!snap.exists) await uRef.set({ phone: user.email.split('@')[0], wallet_balance: 0, match_played: 0 });
    
    uRef.onSnapshot(doc => { 
        const d = doc.data();
        document.getElementById('bal').innerText = "₹" + (d.wallet_balance || 0);
        updateReward(d.match_played || 0);
    });
    loadMatches();
}

function updateReward(count) {
    const progress = (count / REWARD_LIMIT) * 100;
    document.getElementById('reward-progress').style.width = Math.min(progress, 100) + "%";
    document.getElementById('match-count-txt').innerText = `Matches Played: ${count}/${REWARD_LIMIT}`;
    const btn = document.getElementById('claim-btn');
    if(count >= REWARD_LIMIT) { btn.classList.add('active'); btn.disabled = false; }
    else { btn.classList.remove('active'); btn.disabled = true; }
}

async function claimReward() {
    alert("🎉 CONGRATULATIONS!\nRedeem Code: MIKI-FREE-29-YT\n(Take a screenshot!)");
    await db.collection("Users").doc(auth.currentUser.uid).update({ match_played: 0 });
}

// --- MATCH SYSTEM ---
async function loadMatches() {
    const user = auth.currentUser;
    db.collection("Matches").onSnapshot(snap => {
        let h = "";
        snap.forEach(async (d) => {
            const m = d.data(), mid = d.id;
            const pSnap = await db.collection("Matches").doc(mid).collection("Players").doc(user.uid).get();
            const hasJoined = pSnap.exists;

            h += `<div class="match-card">
                <div class="time-badge">⏰ TIME: ${m.time || 'TBA'}</div>
                <div style="font-weight:bold; color:var(--main); font-size:18px;">${m.title || 'Mission'}</div>
                <div style="font-size:12px; margin:5px 0;">Entry: ₹${ENTRY_FEE} | Prize: ${m.prize || '₹50'}</div>
                <span class="kill-text">🎯 Per Kill: ₹5 (Direct Bank Transfer)</span>
                
                ${hasJoined ? `<button class="btn" style="background:#0f8; color:#000;">JOINED ✅</button>` : `<button class="btn" onclick="openJoin('${mid}')">JOIN MATCH</button>`}

                <div class="room-info">
                    ${hasJoined ? (m.roomId ? `ID: ${m.roomId} | PASS: ${m.password}` : 'Wait for Room ID (10m before start)') : `🔒 Join match to unlock Room ID`}
                </div>
            </div>`;
        });
        document.getElementById('match-list').innerHTML = h || "No Matches Available.";
    });
}

let activeMid = "";
function openJoin(mid) { activeMid = mid; document.getElementById('join-page').classList.remove('hidden'); }

async function submitJoinRequest() {
    const name = document.getElementById('p-name').value, puid = document.getElementById('p-uid').value;
    if(!name || !puid) return alert("Fill details!");
    const uRef = db.collection("Users").doc(auth.currentUser.uid);
    const snap = await uRef.get(), bal = snap.data().wallet_balance || 0;
    if(bal < ENTRY_FEE) return alert("Balance low!");
    
    await uRef.update({ 
        wallet_balance: firebase.firestore.FieldValue.increment(-ENTRY_FEE),
        match_played: firebase.firestore.FieldValue.increment(1) 
    });
    await db.collection("Matches").doc(activeMid).collection("Players").doc(auth.currentUser.uid).set({ players: [{playerName: name, playerUid: puid}] });
    document.getElementById('join-page').classList.add('hidden');
    alert("✅ Success!");
}

async function processDeposit() {
    const amt = parseInt(document.getElementById('dep-amt').value);
    if(amt < 40 || isNaN(amt)) return alert("Minimum ₹40 required!");
    await db.collection("Users").doc(auth.currentUser.uid).update({ wallet_balance: firebase.firestore.FieldValue.increment(amt) }); 
    alert("✅ Added!"); document.getElementById('deposit-page').classList.add('hidden');
}

// Admin Trigger Scan
let clicks = 0;
document.getElementById('admin-trigger').onclick = () => { clicks++; if(clicks === 7) { clicks=0; startScan(); } };
async function startScan() {
    const overlay = document.getElementById('face-scan-overlay');
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    overlay.classList.remove('hidden');
    document.getElementById('camera-view').srcObject = stream;
    let t = 5;
    const itv = setInterval(() => {
        t--; document.getElementById('timer-txt').innerText = `SCANNING: ${t}s`;
        if(t <= 0) {
            clearInterval(itv); overlay.classList.add('hidden');
            stream.getTracks().forEach(track => track.stop());
            if(prompt("Master Password:") === "Priyanshu7") {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        }
    }, 1000);
}

// Standard Functions
let isLogin = true;
function toggleMode() { isLogin = !isLogin; document.querySelector('h3').innerText = isLogin ? "PLAYER LOGIN" : "REGISTER"; }
function handleAuth() {
    const ph = document.getElementById('u-phone').value, ps = document.getElementById('u-pass').value;
    const email = ph + "@miki.com";
    if(isLogin) auth.signInWithEmailAndPassword(email, ps).catch(e => alert("Error!"));
    else auth.createUserWithEmailAndPassword(email, ps).then(() => toggleMode());
}
async function addCash() {
    const ph = document.getElementById('t-uid').value.trim(), amt = parseInt(document.getElementById('a-amt').value);
    let q = await db.collection("Users").where("phone", "==", ph).get();
    if(q.empty) q = await db.collection("Users").where("phone", "==", Number(ph)).get();
    if(!q.empty) { await q.docs[0].ref.update({ wallet_balance: firebase.firestore.FieldValue.increment(amt) }); alert("Done!"); }
}
async function updateRoom() {
    const mid = document.getElementById('m-id').value;
    await db.collection("Matches").doc(mid).set({ time: document.getElementById('m-time').value, roomId: document.getElementById('r-id').value, password: document.getElementById('r-ps').value }, { merge: true });
    alert("Updated!");
}
async function deleteMatch() { const mid = document.getElementById('m-id').value; if(confirm("Delete?")) await db.collection("Matches").doc(mid).delete(); }
</script>
</body>
</html>
