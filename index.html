<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIKI MODS | VIP ACCESS</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  :root { --main: #00ff88; --bg: #0d0d0d; --card: #1a1a1a; --red: #ff4444; }
  body { background: var(--bg); color: #fff; font-family: 'Roboto Mono', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
  .status-bar { font-size: 10px; color: var(--main); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; letter-spacing: 1px; }
  .dot { width: 8px; height: 8px; background: var(--main); border-radius: 50%; box-shadow: 0 0 10px var(--main); animation: blink 1.5s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .panel { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 25px; width: 100%; max-width: 400px; margin-bottom: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
  h1 { color: var(--main); cursor: pointer; user-select: none; border-bottom: 2px solid var(--main); padding-bottom: 5px; text-transform: uppercase; letter-spacing: 3px; font-size: 24px; transition: 0.2s; }
  .btn { background: var(--main); color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-family: inherit; transition: 0.3s; }
  .btn-red { background: var(--red); color: #fff; }
  input { background: #222; border: 1px solid #444; color: #fff; padding: 15px; width: calc(100% - 32px); border-radius: 8px; margin-bottom: 10px; text-align: center; font-family: inherit; outline: none; }
  .hidden { display: none; }
  
  /* Admin Payment List Styles */
  .txn-list { text-align: left; font-size: 11px; background: #000; padding: 10px; border-radius: 8px; max-height: 200px; overflow-y: auto; border: 1px solid #444; margin-top: 15px; }
  .txn-item { border-bottom: 1px solid #222; padding: 8px 0; display: flex; justify-content: space-between; }
  
  .footer { margin-top: auto; padding: 20px; text-align: center; width: 100%; }
  .social-icons a { color: var(--main); font-size: 24px; margin: 0 15px; text-decoration: none; }
</style>
</head>
<body>

<div class="status-bar"><div class="dot"></div> SYSTEM: ONLINE | SECURE CONNECTION</div>

<h1 onclick="adminTrigger()">MIKI MODS</h1>

<div id="userSide" style="width:100%; max-width:400px">
  <div class="panel" id="payPanel">
    <p style="color:var(--main); font-weight:bold;">[ STEP 01: DETAILS ]</p>
    <input type="text" id="userName" placeholder="ENTER YOUR NAME">
    <button class="btn" onclick="showQR()">PROCEED TO PAYMENT</button>
    <div id="qrBox" class="hidden"><br>
      <img id="upiQR" width="180" style="background:white; padding:10px; border-radius:10px; border: 2px solid var(--main);">
    </div>
    <div id="verifyBox" class="hidden" style="margin-top:20px">
      <p style="color:var(--main); font-weight:bold;">[ STEP 02: VERIFICATION ]</p>
      <input type="number" id="txnId" placeholder="ENTER 12-DIGIT TRANS ID">
      <button class="btn" onclick="submitTxn()">GET MY CODE</button>
    </div>
  </div>

  <div class="panel hidden" id="unlockPanel">
    <p id="welcomeMsg" style="color:var(--main); font-weight:bold;"></p>
    <h2 id="finalCode" style="color:yellow; font-size:40px; margin:10px 0;"></h2>
    <input type="text" id="inputCode" placeholder="PASTE CODE HERE">
    <button class="btn" onclick="showFiles()">UNLOCK MODS</button>
  </div>
</div>

<div id="adminDashboard" class="panel hidden">
  <h2 style="color:var(--main);">ADMIN PANEL</h2>
  <input type="text" id="newModName" placeholder="NEW MOD NAME">
  <input type="text" id="newModLink" placeholder="DOWNLOAD LINK">
  <button class="btn" onclick="updateModNow()">UPDATE MOD & CLEAN OLD</button>
  
  <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
  <p style="font-size:12px; color:var(--main);">RECENT PAYMENTS:</p>
  <div id="payList" class="txn-list">Loading payments...</div>
  
  <button class="btn btn-red" onclick="location.reload()" style="margin-top:20px;">LOGOUT</button>
</div>

<div id="fileArea" class="hidden" style="width:100%; max-width:400px"></div>

<div class="footer">
  <div class="social-icons">
    <a href="https://youtube.com/@prime_miku" target="_blank"><i class="fab fa-youtube"></i></a>
    <a href="https://www.instagram.com/_prime_miku_" target="_blank"><i class="fab fa-instagram"></i></a>
  </div>
  <p style="font-size:10px; color:#555; margin-top:10px;">© 2026 MIKI MODS OFFICIAL</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp, deleteDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey:"AIzaSyDp4VvkYPWrTZifunRTsyf2oEce2KA2L8o",
 authDomain:"game-65d26.firebaseapp.com",
 projectId:"game-65d26",
 storageBucket:"game-65d26.firebasestorage.app",
 messagingSenderId:"1078240145943",
 appId:"1:1078240145943:web:259e64e15644153317e252"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const upiId = "mrbituyr-1@okicici";
let generatedCode = "";
let userEnteredName = "";
let clickCount = 0;

// ADMIN LOGIN & SHOW PAYMENTS
window.adminTrigger = async function() {
  clickCount++;
  if(clickCount >= 5) {
    let p1 = prompt("Admin Key 1:");
    let p2 = prompt("Admin Key 2:");
    if(p1 === "Anjali" && p2 === "priyanshu") {
      document.getElementById("userSide").classList.add("hidden");
      document.getElementById("adminDashboard").classList.remove("hidden");
      loadAdminData();
    } else { alert("❌ Wrong Access!"); }
    clickCount = 0;
  }
}

async function loadAdminData() {
  const pList = document.getElementById("payList");
  const q = query(collection(db, "payments"), orderBy("time", "desc"));
  const snap = await getDocs(q);
  let html = "";
  snap.forEach(doc => {
    const d = doc.data();
    html += `<div class="txn-item">
              <span><strong>${d.name || 'User'}</strong></span>
              <span style="color:cyan">${d.txnId}</span>
             </div>`;
  });
  pList.innerHTML = html || "No payments yet.";
}

window.updateModNow = async function() {
  const n = document.getElementById("newModName").value.trim();
  const l = document.getElementById("newModLink").value.trim();
  if(!n || !l) return alert("Fill both boxes!");
  try {
    const oldDocs = await getDocs(collection(db, "games"));
    const deletePromises = oldDocs.docs.map(d => deleteDoc(doc(db, "games", d.id)));
    await Promise.all(deletePromises);
    await addDoc(collection(db, "games"), { name: n, link: l, time: serverTimestamp() });
    alert("✅ New Mod Live!");
    location.reload();
  } catch(e) { alert("Error!"); }
}

window.showQR = function() {
  userEnteredName = document.getElementById("userName").value.trim();
  if(!userEnteredName) return alert("Enter Name!");
  const url = `upi://pay?pa=${upiId}&pn=MikiMods&am=20&cu=INR`;
  document.getElementById("upiQR").src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
  document.getElementById("qrBox").classList.remove("hidden");
  document.getElementById("verifyBox").classList.remove("hidden");
}

window.submitTxn = async function() {
  const id = document.getElementById("txnId").value.trim();
  if(id.length !== 12) return alert("❌ 12-digit ID required!");
  const q = query(collection(db, "payments"), where("txnId", "==", id));
  const snap = await getDocs(q);
  if (!snap.empty) return alert("❌ Used!");
  await addDoc(collection(db, "payments"), { txnId: id, name: userEnteredName, time: serverTimestamp() });
  generatedCode = Math.floor(1000 + Math.random() * 9000).toString();
  document.getElementById("welcomeMsg").innerText = `WELCOME, ${userEnteredName.toUpperCase()}!`;
  document.getElementById("payPanel").classList.add("hidden");
  document.getElementById("unlockPanel").classList.remove("hidden");
  document.getElementById("finalCode").innerText = generatedCode;
}

window.showFiles = async function() {
  if(document.getElementById("inputCode").value !== generatedCode) return alert("Wrong Code!");
  const snap = await getDocs(collection(db, "games"));
  let h = `<h2 style='color:var(--main);'>HELLO ${userEnteredName.toUpperCase()}</h2>`;
  snap.forEach(doc => {
    h += `<div class="panel"><h3>${doc.data().name}</h3><a href="${doc.data().link}" target="_blank"><button class="btn">DOWNLOAD</button></a></div>`;
  });
  document.getElementById("userSide").classList.add("hidden");
  document.getElementById("fileArea").innerHTML = h;
  document.getElementById("fileArea").classList.remove("hidden");
}
</script>
</body>
</html>
